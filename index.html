<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Krevio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* CSS-ът си остава същият като преди */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff}
:root{
  --gold:#c9a84c;--gold2:#e8c96d;
  --nav-bg:rgba(10,10,10,.92);
}
body{background:#0a0a0a}
.page{display:none;position:fixed;inset:0;z-index:1;background:#0a0a0a}
.page.active{display:block}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;background:linear-gradient(135deg,#c9a84c,#e8c96d);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.feed-top{position:fixed;top:0;left:0;right:0;z-index:50;background:linear-gradient(to bottom,#0a0a0a,transparent);padding:12px 16px 0}
.feed-top-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.feed-tabs{display:flex;gap:4px;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.2);border-radius:100px;padding:4px}
.feed-tab{flex:1;text-align:center;padding:10px;font-size:.75rem;font-weight:600;color:rgba(255,255,255,.6);border-radius:100px;cursor:pointer}
.feed-tab.active{background:linear-gradient(135deg,#c9a84c,#e8c96d);color:#000}
.feed-wrap{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}
.feed-wrap::-webkit-scrollbar{display:none}
.video-item{height:100vh;scroll-snap-align:start;position:relative;background:#000;overflow:hidden}
.v-player{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.v-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.3) 50%,rgba(0,0,0,.5) 100%);pointer-events:none}
.v-info-zone{position:absolute;bottom:70px;left:0;right:0;z-index:10;padding:0 12px 16px}
.v-creator-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.v-avatar{width:44px;height:44px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:#222}
.v-creator-name{font-size:.9rem;font-weight:700}
.v-creator-handle{font-size:.75rem;color:rgba(255,255,255,.5)}
.v-title-text{font-size:.9rem;margin-bottom:12px;line-height:1.4}
.v-action-bar{display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:8px}
.v-act{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;padding:8px 16px;border-radius:12px;cursor:pointer;color:#fff;font-size:.7rem;transition:all .15s}
.v-act:active{background:rgba(255,255,255,.1)}
.v-act span{font-size:1.5rem;margin-bottom:2px}
.v-act.liked{color:#ff2d55}
.botnav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-around;align-items:center;padding:8px;background:var(--nav-bg);backdrop-filter:blur(20px);border-top:1px solid rgba(201,168,76,.2)}
.bn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;padding:8px 16px;cursor:pointer;color:rgba(255,255,255,.3);font-size:.7rem}
.bn span{font-size:1.5rem;margin-bottom:2px}
.bn.active{color:#c9a84c}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(201,168,76,.2);backdrop-filter:blur(20px);color:#c9a84c;padding:10px 20px;border-radius:100px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.btn-gold{width:100%;background:linear-gradient(135deg,#c9a84c,#e8c96d);color:#000;border:none;border-radius:12px;padding:16px;font-size:1rem;font-weight:800;cursor:pointer}
</style>
</head>
<body>

<!-- FEED PAGE -->
<div id="page-feed" class="page active">
  <div class="feed-top">
    <div class="feed-top-row1">
      <div class="logo">KREVIO</div>
      <div style="display:flex;gap:16px">
        <button class="icon-btn" onclick="showToast('🌙 Тема')" style="background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer">☀️</button>
        <button class="icon-btn" onclick="showAuth()" style="background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer">👤</button>
      </div>
    </div>
    <div class="feed-tabs">
      <div class="feed-tab active" onclick="switchTab(this)">🔥 Trending</div>
      <div class="feed-tab" onclick="switchTab(this)">👥 Following</div>
      <div class="feed-tab" onclick="switchTab(this)">💎 Премиум</div>
    </div>
  </div>
  <div class="feed-wrap" id="feed-wrap"></div>
</div>

<!-- Другите страници -->
<div id="page-search" class="page"><div style="padding:60px 20px;text-align:center">🔍 Търсачка</div></div>
<div id="page-inbox" class="page"><div style="padding:60px 20px;text-align:center">🔔 Известия</div></div>
<div id="page-profile" class="page"><div style="padding:60px 20px;text-align:center">👤 Профил</div></div>

<!-- Навигация -->
<nav class="botnav">
  <button class="bn active" data-page="feed" onclick="showPage('feed')"><span>🏠</span>Начало</button>
  <button class="bn" data-page="search" onclick="showPage('search')"><span>🔍</span>Търси</button>
  <button class="bn" onclick="handleUpload()"><span>➕</span>Качи</button>
  <button class="bn" data-page="inbox" onclick="showPage('inbox')"><span>🔔</span>Известия</button>
  <button class="bn" data-page="profile" onclick="showPage('profile')"><span>👤</span>Профил</button>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// Използваме ЕМОДЖИТА вместо Lucide (за да работи дори от file://)
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
}

function switchTab(tab){
  document.querySelectorAll('.feed-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  showToast(tab.textContent);
}

function handleUpload(){
  showToast('📤 Качването е в разработка');
}

function showAuth(){
  showToast('🔐 Вход / Регистрация');
}

// Зареждане на тестови видеа
window.addEventListener('load',function(){
  var wrap=document.getElementById('feed-wrap');
  
  // Тестови видеа с ЕМОДЖИ бутони
  var videos=[
    {title:'Залез над морето 🌅',creator:'Nature BG',handle:'nature_bg',url:'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4'},
    {title:'Планинско приключение 🏔️',creator:'Adventure Time',handle:'adventure',url:'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4'},
    {title:'Танци от България 💃',creator:'Folk Dance',handle:'folk_bg',url:'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4'}
  ];
  
  videos.forEach((v,i)=>{
    var item=document.createElement('div');
    item.className='video-item';
    
    // Видео
    var vid=document.createElement('video');
    vid.className='v-player';
    vid.src=v.url;
    vid.loop=true;
    vid.muted=true;
    vid.playsInline=true;
    vid.setAttribute('playsinline','');
    item.appendChild(vid);
    
    // Градиент
    var gradient=document.createElement('div');
    gradient.className='v-gradient';
    item.appendChild(gradient);
    
    // Инфо зона
    var info=document.createElement('div');
    info.className='v-info-zone';
    
    // Creator
    var creator=document.createElement('div');
    creator.className='v-creator-bar';
    creator.innerHTML=`
      <div class="v-avatar">🎬</div>
      <div style="flex:1">
        <div class="v-creator-name">${v.creator}</div>
        <div class="v-creator-handle">@${v.handle}</div>
      </div>
    `;
    info.appendChild(creator);
    
    // Заглавие
    var title=document.createElement('div');
    title.className='v-title-text';
    title.textContent=v.title;
    info.appendChild(title);
    
    // Action бутони с ЕМОДЖИТА
    var actions=document.createElement('div');
    actions.className='v-action-bar';
    
    // Харесване
    var likeBtn=document.createElement('button');
    likeBtn.className='v-act';
    likeBtn.innerHTML='<span>❤️</span>0';
    likeBtn.onclick=function(){
      this.classList.toggle('liked');
      showToast(this.classList.contains('liked')?'❤️ Харесано!':'💔 Премахнато');
    };
    
    // Коментари
    var cmtBtn=document.createElement('button');
    cmtBtn.className='v-act';
    cmtBtn.innerHTML='<span>💬</span>0';
    cmtBtn.onclick=()=>showToast('💬 Коментари');
    
    // Запази
    var saveBtn=document.createElement('button');
    saveBtn.className='v-act';
    saveBtn.innerHTML='<span>🔖</span>Запази';
    saveBtn.onclick=()=>showToast('🔖 Запазено!');
    
    // Сподели
    var shareBtn=document.createElement('button');
    shareBtn.className='v-act';
    shareBtn.innerHTML='<span>📤</span>Сподели';
    shareBtn.onclick=()=>showToast('📤 Споделяне');
    
    actions.appendChild(likeBtn);
    actions.appendChild(cmtBtn);
    actions.appendChild(saveBtn);
    actions.appendChild(shareBtn);
    
    info.appendChild(actions);
    item.appendChild(info);
    
    // Клик за пауза/плей
    vid.addEventListener('click',()=>vid.paused?vid.play():vid.pause());
    
    // Двоен тап
    var lastTap=0;
    item.addEventListener('touchend',()=>{
      var now=Date.now();
      if(now-lastTap<300){
        likeBtn.classList.add('liked');
        showToast('❤️❤️ Харесано!');
      }
      lastTap=now;
    });
    
    wrap.appendChild(item);
  });
  
  // Autoplay при скрол
  var observer=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      var v=e.target.querySelector('video');
      if(v)e.isIntersecting?v.play().catch(()=>{}):v.pause();
    });
  },{threshold:0.7});
  
  document.querySelectorAll('.video-item').forEach(v=>observer.observe(v));
});
</script>
</body>
</html>

<script>
// ════════════════════════════════════════════════════════════
// ТВОИТЕ ОРИГИНАЛНИ КЛЮЧОВЕ И КОНФИГУРАЦИЯ
// ════════════════════════════════════════════════════════════
var SB_URL="https://ucsogdvswugpynaqymtg.supabase.co";
var SB_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjc29nZHZzd3VncHluYXF5bXRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzM2NTEsImV4cCI6MjA5MjM0OTY1MX0.pGjks7ghLR6tDyK0RlIPP57xIvbDomx-jelXHO8fEKI";
var BACKEND="https://krevio-backend-production.up.railway.app";

// ════════════════════════════════════════════════════════════
// ГЛОБАЛНИ ПРОМЕНЛИВИ
// ════════════════════════════════════════════════════════════
var sb=null,ME=null,uplFile=null,uplXhr=null,isDark=true,audioUnlocked=false;
var currentVideoId=null,uplAccess="free",followingSet={};
var feedOffset=0,feedBatchSize=5,feedLoading=false,feedHasMore=true;
var currentTab='trending';
var inboxMessages=[];
var feedObserver=null;
var MAX_VIDEOS_IN_DOM=5;

// ════════════════════════════════════════════════════════════
// ПОМОЩНИ ФУНКЦИИ
// ════════════════════════════════════════════════════════════
function fmt(n){if(n>=1000000)return(n/1000000).toFixed(1)+"M";if(n>=1000)return(n/1000).toFixed(1)+"K";return n||0;}
function fmtBytes(b){if(b<1048576)return(b/1024).toFixed(1)+" KB";if(b<1073741824)return(b/1048576).toFixed(1)+" MB";return(b/1073741824).toFixed(2)+" GB";}
function fmtTime(ts){if(!ts)return"";var d=new Date(ts),now=new Date(),diff=Math.floor((now-d)/1000);if(diff<60)return diff+"с";if(diff<3600)return Math.floor(diff/60)+"мин";if(diff<86400)return Math.floor(diff/3600)+"ч";return Math.floor(diff/86400)+"д";}
function showToast(msg){var t=el("toast");if(!t)return;t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},2500);}
function el(id){return document.getElementById(id);}
function mk(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}

// ════════════════════════════════════════════════════════════
// ИНИЦИАЛИЗАЦИЯ
// ════════════════════════════════════════════════════════════
window.addEventListener('load',async function(){
    lucide.createIcons();
    
    if(typeof supabase!=="undefined"){
        sb=supabase.createClient(SB_URL,SB_ANON);
        var {data}=await sb.auth.getSession();
        if(data&&data.session){
            var u=data.session.user;
            ME={id:u.id,email:u.email,name:u.user_metadata?.name||u.email.split("@")[0]};
            await loadProfile();
            await loadFollowing();
            updateProfileIcon();
        }
        sb.auth.onAuthStateChange(async function(event,session){
            if(session){
                var u=session.user;
                ME={id:u.id,email:u.email,name:u.user_metadata?.name||u.email.split("@")[0]};
                await loadProfile();
                await loadFollowing();
                updateProfileIcon();
            }else{
                ME=null;
                updateProfileIcon();
            }
        });
    }
    
    initNavigation();
    bindFeedTabs();
    bindAuth();
    bindUpload();
    bindSearch();
    bindModals();
    
    renderFeed();
    updateInboxBadge();
});

// ════════════════════════════════════════════════════════════
// ЗАРЕЖДАНЕ НА ПРОФИЛ И ПОСЛЕДВАНИЯ
// ════════════════════════════════════════════════════════════
async function loadProfile(){
    if(!sb||!ME)return;
    try{
        var {data}=await sb.from("profiles").select("*").eq("id",ME.id).single();
        if(data){
            ME.avatar=data.avatar_url?data.avatar_url+"?t="+Date.now():"";
            ME.bio=data.bio||"";
            ME.username=data.username||ME.name;
        }
    }catch(e){}
}

async function loadFollowing(){
    if(!sb||!ME)return;
    try{
        var {data}=await sb.from("follows").select("following_id").eq("follower_id",ME.id);
        if(data){
            data.forEach(function(f){followingSet[f.following_id]=true;});
        }
    }catch(e){}
}

function updateProfileIcon(){
    var btn=el("auth-top-btn");
    if(!btn)return;
    btn.innerHTML="";
    if(ME&&ME.avatar){
        var img=document.createElement("img");
        img.src=ME.avatar;
        img.style.width="28px";
        img.style.height="28px";
        img.style.borderRadius="50%";
        img.style.objectFit="cover";
        img.style.border="2px solid var(--gold)";
        btn.appendChild(img);
    }else{
        var i=document.createElement("i");
        i.setAttribute("data-lucide","user");
        btn.appendChild(i);
        lucide.createIcons();
    }
    btn.onclick=function(){showPage('profile');};
}

// ════════════════════════════════════════════════════════════
// НАВИГАЦИЯ
// ════════════════════════════════════════════════════════════
function initNavigation(){
    el("bn-feed").onclick=function(){showPage("feed");};
    el("bn-search").onclick=function(){showPage("search");};
    el("bn-upload").onclick=function(){
        if(!ME){el("m-auth").classList.add("open");lucide.createIcons();return;}
        resetUpload();el("m-upload").classList.add("open");lucide.createIcons();
    };
    el("bn-inbox").onclick=function(){showPage("inbox");};
    el("bn-profile").onclick=function(){showPage("profile");};
}

function showPage(page){
    document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
    document.querySelectorAll(".bn").forEach(function(b){b.classList.remove("active");});
    var pg=el("page-"+page);if(pg)pg.classList.add("active");
    var bn=el("bn-"+page);if(bn)bn.classList.add("active");
    if(page==="profile")renderProfile();
    if(page==="search")renderSearch();
    if(page==="inbox")renderInbox();
    if(page==="creator")showToast("Creator Панел скоро");
}

// ════════════════════════════════════════════════════════════
// ТОЧКА 5: ТАБОВЕ TRENDING / FOLLOWING / PREMIUM
// ════════════════════════════════════════════════════════════
function bindFeedTabs(){
    document.querySelectorAll('.feed-tab').forEach(function(tab){
        tab.onclick=function(){
            document.querySelectorAll('.feed-tab').forEach(function(t){t.classList.remove('active');});
            tab.classList.add('active');
            currentTab=tab.dataset.tab;
            resetFeed();
            renderFeed();
            showToast(currentTab==='trending'?'🔥 Trending':currentTab==='following'?'👥 Following':'💎 Премиум');
        };
    });
}

function resetFeed(){
    feedOffset=0;
    feedLoading=false;
    feedHasMore=true;
    if(feedObserver){feedObserver.disconnect();feedObserver=null;}
}

// ════════════════════════════════════════════════════════════
// ТОЧКА 1: FEED С ПРИОРИТЕТНО РАЗБЪРКВАНЕ
// ════════════════════════════════════════════════════════════
async function renderFeed(){
    var wrap=el("feed-wrap");if(!wrap)return;
    if(feedObserver){feedObserver.disconnect();}
    wrap.innerHTML="";
    resetFeed();
    await loadMoreVideos();
    
    var sentinel=mk("div","load-more");sentinel.id="feed-sentinel";
    var spinner=mk("div","load-more-spinner");sentinel.appendChild(spinner);
    wrap.appendChild(sentinel);
    
    feedObserver=new IntersectionObserver(function(entries){
        if(entries[0].isIntersecting&&!feedLoading&&feedHasMore){loadMoreVideos();}
    },{threshold:0.1});
    feedObserver.observe(sentinel);
    
    lucide.createIcons();
}

async function loadMoreVideos(){
    if(feedLoading||!feedHasMore)return;
    feedLoading=true;
    var wrap=el("feed-wrap");if(!wrap){feedLoading=false;return;}
    var sentinel=el("feed-sentinel");
    
    var videos=[];
    if(sb){
        try{
            var r;
            if(currentTab==='following'&&ME){
                var followedIds=Object.keys(followingSet).filter(function(k){return followingSet[k];});
                if(followedIds.length===0){
                    if(feedOffset===0){
                        var empty=mk("div");
                        empty.style.cssText="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(201,168,76,.4);text-align:center;padding:20px";
                        empty.innerHTML="<div style='font-size:3rem;margin-bottom:16px'>👥</div><div style='font-size:1rem;font-weight:700;margin-bottom:8px;color:rgba(201,168,76,.6)'>Не следваш никого</div><div style='font-size:.82rem'>Следвай творци от Trending!</div>";
                        wrap.insertBefore(empty,sentinel);
                    }
                    feedHasMore=false;feedLoading=false;return;
                }
                r=await sb.from("videos").select("*").in("user_id",followedIds).order("created_at",{ascending:false}).range(feedOffset,feedOffset+feedBatchSize-1);
            }else{
                r=await sb.from("videos").select("*").order("created_at",{ascending:false}).range(feedOffset,feedOffset+feedBatchSize-1);
            }
            if(r.data)videos=r.data;
            if(!r.data||r.data.length<feedBatchSize)feedHasMore=false;
        }catch(e){feedLoading=false;return;}
    }
    
    if(feedOffset===0&&videos.length===0&&currentTab!=='following'){
        var empty=mk("div");
        empty.style.cssText="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(201,168,76,.4);text-align:center;padding:20px";
        empty.innerHTML="<div style='font-size:3rem;margin-bottom:16px'>🎬</div><div style='font-size:1rem;font-weight:700;margin-bottom:8px;color:rgba(201,168,76,.6)'>Все още няма видеа</div><div style='font-size:.82rem'>Бъди първият, който качи!</div>";
        wrap.insertBefore(empty,sentinel);
        feedLoading=false;return;
    }
    
    // ПРИОРИТЕТНО РАЗБЪРКВАНЕ (Точка 1)
    videos.sort(function(a,b){
        var scoreA=(a.views||0)*0.7+(a.likes_count||0)*0.3;
        var scoreB=(b.views||0)*0.7+(b.likes_count||0)*0.3;
        return scoreB-scoreA;
    });
    
    // Леко разместване за разнообразие
    if(videos.length>2){
        for(var i=videos.length-1;i>0;i--){
            var j=Math.floor(Math.random()*(i+1));
            if(Math.random()>0.7){var temp=videos[i];videos[i]=videos[j];videos[j]=temp;}
        }
    }
    
    videos.forEach(function(v,i){
        var card=buildVideo(v,feedOffset+i);
        if(sentinel)wrap.insertBefore(card,sentinel);
        else wrap.appendChild(card);
    });
    
    feedOffset+=videos.length;
    if(!feedHasMore&&sentinel)sentinel.style.display="none";
    feedLoading=false;
    cleanupOldVideos();
    lucide.createIcons();
}

function cleanupOldVideos(){
    var items=document.querySelectorAll('.video-item');
    if(items.length>MAX_VIDEOS_IN_DOM){
        for(var i=0;i<items.length-MAX_VIDEOS_IN_DOM;i++){
            var player=items[i].querySelector('video');
            if(player){player.pause();player.src='';player.load();}
            items[i].remove();
        }
    }
}

// ════════════════════════════════════════════════════════════
// ТОЧКИ 2,3,4: БУТОН ПОСЛЕДВАЙ, ПРОФИЛНА СНИМКА, КЛИК
// ════════════════════════════════════════════════════════════
function buildVideo(v,i){
    var item=mk("div","video-item");
    
    var vid=document.createElement("video");
    vid.className="v-player";vid.src=v.file_url;vid.loop=true;vid.muted=true;vid.playsInline=true;vid.preload="none";
    item.appendChild(vid);
    
    var gradient=mk("div","v-gradient");item.appendChild(gradient);
    
    var prog=mk("div","v-progress");var fill=mk("div","v-progress-fill");fill.id="prog-"+i;prog.appendChild(fill);item.appendChild(prog);
    
    vid.addEventListener("timeupdate",function(){if(vid.duration)fill.style.width=(vid.currentTime/vid.duration*100)+"%";});
    vid.addEventListener("click",function(){if(vid.paused)vid.play();else vid.pause();});
    
    var observer=new IntersectionObserver(function(entries){
        entries.forEach(function(entry){
            if(entry.isIntersecting){vid.play().catch(function(){});}
            else{vid.pause();vid.currentTime=0;}
        });
    },{threshold:0.8});
    observer.observe(item);
    
    // Инфо зона
    var infoZone=mk("div","v-info-zone");
    
    var creatorBar=mk("div","v-creator-bar");
    
    // ТОЧКА 3: Профилна снимка на твореца
    var cAv=mk("div","v-avatar");
    if(v.creator_avatar){
        var avImg=document.createElement("img");avImg.src=v.creator_avatar;cAv.appendChild(avImg);
    }else{cAv.textContent="🎬";}
    
    // ТОЧКА 4: Клик върху икона води до профил
    cAv.onclick=function(){openCreatorProfile(v.user_id);};
    
    var cInfo=mk("div","v-creator-info");
    var cName=mk("div","v-creator-name");cName.textContent=v.creator_name||v.title||"Творец";
    var cHandle=mk("div","v-creator-handle");cHandle.textContent="@"+(v.creator_handle||"creator");
    cInfo.appendChild(cName);cInfo.appendChild(cHandle);
    
    var cBtns=mk("div","v-creator-btns");
    
    // ТОЧКА 2: Бутон Следвай (РАБОТЕЩ)
    var followBtn=mk("button","v-follow-btn");
    updateFollowButtonUI(followBtn,v.user_id);
    followBtn.onclick=async function(e){
        e.stopPropagation();
        if(!ME){el("m-auth").classList.add("open");lucide.createIcons();return;}
        if(followingSet[v.user_id]){
            try{await sb.from("follows").delete().eq("follower_id",ME.id).eq("following_id",v.user_id);}catch(e){}
            followingSet[v.user_id]=false;
        }else{
            try{await sb.from("follows").insert({follower_id:ME.id,following_id:v.user_id});}catch(e){}
            followingSet[v.user_id]=true;
        }
        updateFollowButtonUI(followBtn,v.user_id);
        showToast(followingSet[v.user_id]?"✅ Следваш!":"Спря да следваш");
    };
    
    var subBtn=mk("button","v-sub-btn");subBtn.textContent="Абонирай";
    subBtn.onclick=function(){showToast("Скоро!");};
    
    cBtns.appendChild(followBtn);cBtns.appendChild(subBtn);
    creatorBar.appendChild(cAv);creatorBar.appendChild(cInfo);creatorBar.appendChild(cBtns);
    infoZone.appendChild(creatorBar);
    
    if(v.description){
        var titleEl=mk("div","v-title-text");titleEl.textContent=v.description;infoZone.appendChild(titleEl);
    }
    
    // Хаштагове
    if(v.hashtags){
        var tags=mk("div","v-tags");
        v.hashtags.split(" ").forEach(function(t){
            var tg=mk("span","v-tag");tg.textContent=t;tags.appendChild(tg);
        });
        infoZone.appendChild(tags);
    }else{
        var tags=mk("div","v-tags");
        var t1=mk("span","v-tag");t1.textContent="#krevio";tags.appendChild(t1);
        infoZone.appendChild(tags);
    }
    
    // Action bar
    var actionBar=mk("div","v-action-bar");
    
    var likeBtn=mk("button","v-act");
    likeBtn.innerHTML='<i data-lucide="heart"></i><span>0</span>';
    likeBtn.onclick=function(){likeBtn.classList.toggle('liked');showToast(likeBtn.classList.contains('liked')?'❤️ Харесано':'💔 Премахнато');};
    actionBar.appendChild(likeBtn);
    
    var cmtBtn=mk("button","v-act");
    cmtBtn.innerHTML='<i data-lucide="message-circle"></i><span>0</span>';
    cmtBtn.onclick=function(){openComments(v.id);};
    actionBar.appendChild(cmtBtn);
    
    var saveBtn=mk("button","v-act");
    saveBtn.innerHTML='<i data-lucide="bookmark"></i><span>Запази</span>';
    saveBtn.onclick=function(){saveBtn.classList.toggle('saved');showToast(saveBtn.classList.contains('saved')?'🔖 Запазено':'Премахнато');};
    actionBar.appendChild(saveBtn);
    
    var shareBtn=mk("button","v-act");
    shareBtn.innerHTML='<i data-lucide="share-2"></i><span>Сподели</span>';
    shareBtn.onclick=function(){if(navigator.share)navigator.share({title:v.title,url:window.location.href});else showToast('📤 Копирано!');};
    actionBar.appendChild(shareBtn);
    
    infoZone.appendChild(actionBar);
    item.appendChild(infoZone);
    
    return item;
}

function updateFollowButtonUI(btn,userId){
    if(followingSet[userId]){
        btn.textContent="✓ Следваш";btn.classList.add("following");
    }else{
        btn.textContent="Следвай";btn.classList.remove("following");
    }
}

function openCreatorProfile(userId){
    if(ME&&userId===ME.id){showPage("profile");return;}
    showToast("👤 Профил на творец (скоро)");
}

// ════════════════════════════════════════════════════════════
// ТОЧКИ 6,8: ТЪРСАЧКА
// ════════════════════════════════════════════════════════════
function bindSearch(){
    var inp=el("search-inp");if(!inp)return;
    inp.oninput=async function(){
        var q=this.value.trim();
        if(!q){renderSearch();return;}
        if(!sb)return;
        try{
            var [rp,rv]=await Promise.all([
                sb.from("profiles").select("*").or("username.ilike.%"+q+"%,full_name.ilike.%"+q+"%").limit(10),
                sb.from("videos").select("*").ilike("title","%"+q+"%").limit(10)
            ]);
            renderResults(rp.data||[],rv.data||[]);
        }catch(e){}
    };
}

async function renderSearch(){
    var wrap=el("search-list");if(!wrap||!sb)return;wrap.innerHTML="";
    try{
        var {data}=await sb.from("profiles").select("*").limit(20);
        renderResults(data||[],[]);
    }catch(e){}
}

function renderResults(profiles,videos){
    var wrap=el("search-list");if(!wrap)return;wrap.innerHTML="";
    var has=false;
    if(profiles&&profiles.length>0){
        has=true;
        var lbl=mk("div","sec-label");lbl.textContent="👤 Творци";wrap.appendChild(lbl);
        profiles.forEach(function(c){
            var row=mk("div","creator-row");
            var av=mk("div","cr-avatar");
            if(c.avatar_url){var img=document.createElement("img");img.src=c.avatar_url;av.appendChild(img);}
            else av.textContent="👤";
            var info=mk("div");info.style.flex="1";
            var nm=mk("div","cr-name");nm.textContent=c.full_name||c.username||"Потребител";
            var hd=mk("div","cr-handle");hd.textContent="@"+(c.username||"user");
            info.appendChild(nm);info.appendChild(hd);
            row.appendChild(av);row.appendChild(info);
            row.onclick=function(){openCreatorProfile(c.id);};
            wrap.appendChild(row);
        });
    }
    if(videos&&videos.length>0){
        has=true;
        var lbl2=mk("div","sec-label");lbl2.textContent="🎬 Видеа";wrap.appendChild(lbl2);
        videos.forEach(function(v){
            var row=mk("div","creator-row");
            var av=mk("div","cr-avatar");av.textContent="🎬";
            var nm=mk("div","cr-name");nm.textContent=v.title;
            row.appendChild(av);row.appendChild(nm);
            row.onclick=function(){showToast("▶ "+v.title);};
            wrap.appendChild(row);
        });
    }
    if(!has)wrap.innerHTML="<div style='text-align:center;padding:30px;color:var(--text2)'>Няма намерени резултати</div>";
}

// ════════════════════════════════════════════════════════════
// ТОЧКА 7,9: КАЧВАНЕ С ХАШТАГОВЕ И ЗАТВАРЯНЕ
// ════════════════════════════════════════════════════════════
function resetUpload(){
    uplFile=null;uplAccess="free";
    el("upl-inp").value="";
    el("upl-dz").style.display="block";
    el("upl-fi").style.display="none";
    el("upl-prog").style.display="none";
    el("upl-suc").style.display="none";
    el("upl-go-btn").style.display="block";
    el("upl-cancel-btn").style.display="block";
    el("upl-bar").style.width="0";
    el("upl-title").value="";
    el("upl-desc").value="";
    el("upl-hashtags").value="";
    el("upl-access").value="free";
}

function bindUpload(){
    el("upl-dz").onclick=function(){el("upl-inp").click();};
    el("upl-inp").onchange=function(){if(this.files&&this.files[0])setFile(this.files[0]);};
    el("upl-fi-rm").onclick=resetUpload;
    
    el("upl-go-btn").onclick=startUpload;
    el("upl-cancel-btn").onclick=function(){
        if(uplXhr){uplXhr.abort();uplXhr=null;}
        el("m-upload").classList.remove("open");
        resetUpload();
    };
    
    // ТОЧКА 9: Дръжка за затваряне (РАБОТЕЩА)
    var handle=el("handle-upload");var startY=0;
    if(handle){
        handle.addEventListener("touchstart",function(e){startY=e.touches[0].clientY;},{passive:true});
        handle.addEventListener("touchend",function(e){
            if(e.changedTouches[0].clientY-startY>50){
                el("m-upload").classList.remove("open");
                resetUpload();
            }
        },{passive:true});
    }
    
    el("upl-dz").ondragover=function(e){e.preventDefault();this.classList.add("over");};
    el("upl-dz").ondragleave=function(){this.classList.remove("over");};
    el("upl-dz").ondrop=function(e){e.preventDefault();this.classList.remove("over");if(e.dataTransfer&&e.dataTransfer.files[0])setFile(e.dataTransfer.files[0]);};
}

function setFile(f){
    uplFile=f;
    el("upl-dz").style.display="none";
    el("upl-fi").style.display="flex";
    document.getElementById("upl-fi-name").innerHTML="<div style='font-weight:600;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)'>"+f.name+"</div><div style='font-size:.67rem;color:var(--text2)'>"+fmtBytes(f.size)+"</div>";
}

async function startUpload(){
    if(!uplFile){showToast("Избери видео!");return;}
    var tit=el("upl-title");if(!tit.value.trim()){showToast("Въведи заглавие!");return;}
    
    var token="";
    if(sb){
        try{var s=await sb.auth.getSession();if(s.data&&s.data.session)token=s.data.session.access_token;}catch(e){}
    }
    if(!token){showToast("Влез в акаунта!");return;}
    
    el("upl-go-btn").style.display="none";
    el("upl-cancel-btn").style.display="none";
    el("upl-prog").style.display="block";
    
    try{
        var accessMap={free:"free",paid:"fan",subscribers:"studio"};
        var pr=await fetch(BACKEND+"/presign",{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
            body:JSON.stringify({
                fileName:uplFile.name,
                mimeType:uplFile.type,
                title:tit.value.trim(),
                description:el("upl-desc").value,
                hashtags:el("upl-hashtags").value,
                access:accessMap[el("upl-access").value]||"free"
            })
        });
        var pd=await pr.json();
        if(!pr.ok){el("upl-go-btn").style.display="block";el("upl-cancel-btn").style.display="block";showToast("❌ "+(pd.error||"Грешка"));return;}
        
        var t0=Date.now();
        uplXhr=new XMLHttpRequest();
        uplXhr.open("PUT",pd.uploadUrl,true);
        uplXhr.setRequestHeader("Content-Type",uplFile.type);
        uplXhr.upload.onprogress=function(e){
            if(!e.lengthComputable)return;
            var p=Math.round(e.loaded/e.total*100);
            el("upl-bar").style.width=p+"%";
        };
        uplXhr.onload=function(){
            uplXhr=null;
            if(this.status===200){
                el("upl-prog").style.display="none";
                el("upl-suc").style.display="block";
                showToast("✅ Качено успешно!");
                // ТОЧКА 9: Автоматично затваряне след 1.5 секунди
                setTimeout(function(){
                    el("m-upload").classList.remove("open");
                    resetUpload();
                    renderFeed();
                },1500);
            }else{
                el("upl-go-btn").style.display="block";
                el("upl-cancel-btn").style.display="block";
                showToast("❌ Грешка: "+this.status);
            }
        };
        uplXhr.onerror=function(){
            uplXhr=null;
            el("upl-go-btn").style.display="block";
            el("upl-cancel-btn").style.display="block";
            showToast("❌ Мрежова грешка.");
        };
        uplXhr.send(uplFile);
    }catch(err){
        el("upl-go-btn").style.display="block";
        el("upl-cancel-btn").style.display="block";
        showToast("❌ "+err.message);
    }
}

// ════════════════════════════════════════════════════════════
// КОМЕНТАРИ
// ════════════════════════════════════════════════════════════
async function openComments(videoId){
    currentVideoId=videoId;
    // Използваме m-upload за коментари (за простота)
    var mbox=el("m-upload").querySelector(".mbox");
    var origContent=mbox.innerHTML;
    
    mbox.innerHTML='<div class="mhandle" id="handle-comments"></div><div class="mtitle">Коментари</div><div class="cmt-list" id="cmt-list" style="max-height:50vh;overflow-y:auto;margin-bottom:16px"></div><div class="cmt-input" style="display:flex;gap:8px"><input type="text" id="cmt-inp" class="fi" placeholder="Добави коментар..." style="flex:1"><button class="btn-gold" id="cmt-send-btn" style="width:auto;padding:12px 16px;min-height:auto">📤</button></div>';
    
    el("m-upload").classList.add("open");
    
    var handle=document.getElementById("handle-comments");
    if(handle){
        var startY=0;
        handle.addEventListener("touchstart",function(e){startY=e.touches[0].clientY;},{passive:true});
        handle.addEventListener("touchend",function(e){
            if(e.changedTouches[0].clientY-startY>50){
                el("m-upload").classList.remove("open");
                mbox.innerHTML=origContent;
                bindUpload();
            }
        },{passive:true});
    }
    
    await loadComments(videoId);
    
    el("cmt-send-btn").onclick=async function(){
        var inp=el("cmt-inp");if(!inp||!inp.value.trim())return;
        if(!ME){showToast("Влез за да коментираш!");return;}
        try{
            await sb.from("comments").insert({video_id:videoId,user_id:ME.id,username:ME.username||ME.name,text:inp.value.trim()});
            inp.value="";
            await loadComments(videoId);
            showToast("💬 Коментарът е добавен!");
        }catch(e){showToast("Грешка!");}
    };
}

async function loadComments(videoId){
    var list=el("cmt-list");if(!list||!sb)return;
    try{
        var {data}=await sb.from("comments").select("*").eq("video_id",videoId).order("created_at",{ascending:true}).limit(50);
        list.innerHTML="";
        if(!data||data.length===0){list.innerHTML="<div style='text-align:center;padding:20px;color:var(--text2)'>Няма коментари</div>";return;}
        data.forEach(function(c){
            var item=mk("div","cmt-item");
            item.innerHTML='<div class="cmt-av">👤</div><div><div class="cmt-name">'+(c.username||"Потребител")+'</div><div class="cmt-text">'+c.text+'</div><div class="cmt-time">'+fmtTime(c.created_at)+' назад</div></div>';
            list.appendChild(item);
        });
    }catch(e){}
}

// ════════════════════════════════════════════════════════════
// АВТЕНТИКАЦИЯ
// ════════════════════════════════════════════════════════════
function bindAuth(){
    el("auth-login-btn").onclick=async function(){
        var email=el("auth-email").value.trim();
        var pass=el("auth-pass").value;
        if(!email||!pass){showToast("Попълни имейл и парола");return;}
        var {data,error}=await sb.auth.signInWithPassword({email:email,password:pass});
        if(error){showToast("❌ Грешка: "+error.message);return;}
        ME={id:data.user.id,email:data.user.email,name:data.user.user_metadata?.name||email.split("@")[0]};
        await loadProfile();await loadFollowing();updateProfileIcon();
        el("m-auth").classList.remove("open");
        showToast("👋 Здравей, "+ME.name+"!");
        renderProfile();renderFeed();
    };
    
    el("auth-register-btn").onclick=async function(){
        var email=el("auth-email").value.trim();
        var pass=el("auth-pass").value;
        if(!email||!pass){showToast("Попълни имейл и парола");return;}
        if(pass.length<8){showToast("Паролата трябва да е поне 8 символа");return;}
        var {data,error}=await sb.auth.signUp({
            email:email,password:pass,
            options:{data:{name:email.split("@")[0]}}
        });
        if(error){showToast("❌ Грешка: "+error.message);return;}
        if(data?.user){
            await sb.from("profiles").insert({id:data.user.id,username:email.split("@")[0].toLowerCase(),full_name:email.split("@")[0]});
        }
        el("m-auth").classList.remove("open");
        showToast("✅ Провери имейла си!");
    };
}

// МОДАЛИ

function bindModals(){
    document.querySelectorAll('.modal').forEach(function(m){
        m.addEventListener('click',function(e){if(e.target===m)m.classList.remove('open');});
    });
}

// ════════════════════════════════════════════════════════════
async function renderProfile(){
    var wrap=el("profile-body");if(!wrap)return;
    
    if(!ME){
        wrap.innerHTML="<div style='padding:60px 20px;text-align:center'><div style='font-size:3rem;margin-bottom:16px'>👤</div><div style='font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--text)'>Влез в акаунта си</div><button class='btn-gold' style='width:auto;padding:12px 32px;margin:0 auto;display:block' onclick=\"el('m-auth').classList.add('open')\">Вход / Регистрация</button></div>";
        return;
    }
    
    var myVideosCount=0;
    if(sb){try{var {count}=await sb.from("videos").select("id",{count:"exact"}).eq("user_id",ME.id);myVideosCount=count||0;}catch(e){}}
    
    wrap.innerHTML='<div class="p-banner"><div class="p-banner-gradient"></div></div>'+
        '<div class="p-hero">'+
        '<div class="p-avatar-wrap">'+(ME.avatar?'<img src="'+ME.avatar+'">':'👤')+'</div>'+
        '<div class="p-name">'+(ME.username||ME.name)+'</div>'+
        '<div class="p-handle">@'+(ME.username||ME.name).toLowerCase().replace(/\s+/g,"_")+'</div>'+
        '<div class="p-bio">'+(ME.bio||"Добави биография")+'</div>'+
        '<div class="p-stats"><div><div class="pst-n">'+myVideosCount+'</div><div class="pst-l">Видеа</div></div><div><div class="pst-n">0</div><div class="pst-l">Фена</div></div><div><div class="pst-n">'+Object.keys(followingSet).filter(function(k){return followingSet[k];}).length+'</div><div class="pst-l">Следва</div></div></div>'+
        '<button class="btn-gold" onclick="showPage(\'creator\')" style="width:auto;padding:12px 32px">🎬 Creator Панел</button>'+
        '<button class="btn-gold" onclick="logout()" style="background:var(--card);color:#fff;width:auto;padding:12px 32px;margin-top:8px">🚪 Изход</button>'+
        '</div>';
}

async function logout(){
    if(sb)await sb.auth.signOut();
    ME=null;followingSet={};
    updateProfileIcon();
    renderProfile();
    renderFeed();
    showToast("👋 Излязохте!");
}

function renderInbox(){
    var wrap=el("inbox-list");if(!wrap)return;
    var systemNotifs=[
        {ico:"❤️",text:"Някой хареса твоето видео",time:"2 мин",unread:true},
        {ico:"💬",text:"Нов коментар на твоето видео",time:"1 ч",unread:true},
        {ico:"👤",text:"Нов последовател",time:"вчера",unread:false},
        {ico:"⭐",text:"Добре дошъл в Krevio!",time:"2 дни",unread:false}
    ];
    wrap.innerHTML="";
    systemNotifs.forEach(function(n){
        var item=mk("div","creator-row");
        item.innerHTML='<div class="cr-avatar" style="font-size:1.5rem">'+n.ico+'</div><div style="flex:1"><div class="cr-name">'+n.text+'</div><div class="cr-handle">'+n.time+'</div></div>'+(n.unread?'<div style="width:10px;height:10px;background:#c9a84c;border-radius:50%"></div>':'');
        wrap.appendChild(item);
    });
}

function updateInboxBadge(){
    var badge=el("inbox-badge");if(!badge)return;
    var count=inboxMessages.filter(function(m){return m.unread;}).length;
    if(count>0){badge.textContent=count;badge.style.display="flex";}
    else badge.style.display="none";
}

<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Krevio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif}
        :root{
            --bg:#0a0a0a;--surface:#111;--card:#181818;
            --text:#fff;--text2:rgba(255,255,255,.6);--text3:rgba(255,255,255,.3);
            --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
            --gold:#c9a84c;--gold2:#e8c96d;--gold-dim:rgba(201,168,76,.12);
            --nav-bg:rgba(10,10,10,.92);--nav-border:rgba(201,168,76,.2);
            --sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom);
        }
        body{background:var(--bg);color:var(--text)}
        .page{display:none;position:fixed;inset:0;z-index:1;background:var(--bg)}
        .page.active{display:block}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;background:linear-gradient(135deg,#c9a84c,#e8c96d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
        .feed-top{position:fixed;top:0;left:0;right:0;z-index:50;background:linear-gradient(to bottom,rgba(10,10,10,.9),transparent);padding:max(12px,var(--sat)) 16px 0;transition:opacity .3s}
        .feed-top-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
        .feed-top-icons{display:flex;gap:12px;align-items:center}
        .icon-btn{background:none;border:none;cursor:pointer;padding:8px;display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;position:relative;border-radius:50%;overflow:hidden}
        .icon-btn img{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
        .icon-btn svg{width:24px;height:24px;stroke:#fff;stroke-width:1.5;fill:none}
        .feed-tabs{display:flex;gap:0;background:rgba(255,255,255,.06);border:1px solid var(--nav-border);border-radius:100px;padding:4px;margin-bottom:8px}
        .feed-tab{flex:1;text-align:center;padding:12px 8px;font-size:.75rem;font-weight:600;color:var(--text2);border-radius:100px;cursor:pointer;transition:all .2s;white-space:nowrap;min-height:44px;display:flex;align-items:center;justify-content:center}
        .feed-tab.active{background:linear-gradient(135deg,#c9a84c,#e8c96d);color:#000;font-weight:700}
        #page-feed{background:#000}
        .feed-wrap{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}
        .feed-wrap::-webkit-scrollbar{display:none}
        .video-item{height:100vh;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;background:#111;overflow:hidden}
        .v-player{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;cursor:pointer}
        .v-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.4) 50%,rgba(0,0,0,.6) 100%);pointer-events:none;transition:opacity .3s}
        .v-progress{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,.15);z-index:16}
        .v-progress-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#e8c96d);border-radius:4px;transition:width .1s linear;width:0}
        .v-info-zone{position:absolute;bottom:max(68px,calc(68px + var(--sab)));left:0;right:0;z-index:10;padding:0 12px 16px;transition:opacity .3s}
        .v-creator-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
        .v-avatar{width:48px;height:48px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;background:#222;overflow:hidden;cursor:pointer;min-width:48px}
        .v-avatar img{width:100%;height:100%;object-fit:cover}
        .v-creator-info{flex:1}
        .v-creator-name{font-size:.9rem;font-weight:700;color:#fff;margin-bottom:2px}
        .v-creator-handle{font-size:.75rem;color:rgba(255,255,255,.55)}
        .v-creator-btns{display:flex;gap:8px}
        .v-follow-btn{background:transparent;border:1.5px solid var(--gold);color:var(--gold);padding:8px 16px;border-radius:100px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;min-height:44px}
        .v-follow-btn.following{background:var(--gold-dim)}
        .v-sub-btn{background:linear-gradient(135deg,#c9a84c,#e8c96d);border:none;color:#000;padding:8px 16px;border-radius:100px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;min-height:44px}
        .v-title-text{font-size:.9rem;color:rgba(255,255,255,.95);line-height:1.5;margin-bottom:8px}
        .v-tags{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
        .v-tag{font-size:.75rem;color:var(--gold);font-weight:600}
        .v-action-bar{display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,.5);backdrop-filter:blur(20px);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:8px 4px}
        .v-act{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:none;border:none;padding:8px 12px;border-radius:12px;transition:all .15s;min-width:64px;min-height:64px}
        .v-act:active{background:rgba(255,255,255,.1);transform:scale(.95)}
        .v-act svg{width:28px;height:28px;stroke:#fff;stroke-width:1.8;fill:none}
        .v-act span{font-size:.7rem;color:rgba(255,255,255,.8);font-weight:600}
        .v-act.liked svg{fill:#ff2d55;stroke:#ff2d55}
        .v-act.saved svg{fill:var(--gold);stroke:var(--gold)}
        .botnav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-around;align-items:center;padding:8px 4px max(8px,var(--sab));background:var(--nav-bg);backdrop-filter:blur(30px);border-top:1px solid var(--nav-border)}
        .bn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:none;border:none;padding:8px 12px;position:relative;min-width:64px;min-height:56px}
        .bn svg{width:26px;height:26px;stroke:var(--text3);stroke-width:1.8;fill:none;transition:all .2s}
        .bn span{font-size:.55rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
        .bn.active svg{stroke:var(--gold)}
        .bn.active span{color:var(--gold)}
        .bn-badge{position:absolute;top:4px;right:8px;min-width:18px;height:18px;background:#ff2d55;border-radius:100px;font-size:.55rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;color:#fff;display:none}
        .bn-plus-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;min-width:64px}
        .bn-plus{width:48px;height:32px;background:linear-gradient(135deg,#c9a84c,#e8c96d);border-radius:10px;display:flex;align-items:center;justify-content:center}
        .bn-plus svg{width:22px;height:22px;stroke:#000;stroke-width:2.5;fill:none}
        .bn-plus-wrap span{font-size:.55rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
        #page-search,#page-inbox,#page-profile,#page-creator{overflow-y:auto;padding-top:calc(60px + var(--sat));padding-bottom:calc(72px + var(--sab))}
        .page-header{position:fixed;top:0;left:0;right:0;z-index:50;height:56px;display:flex;align-items:center;justify-content:space-between;padding:var(--sat) 16px 0;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--nav-border)}
        .page-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold);letter-spacing:3px;padding-top:8px}
        .search-box{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--border2);border-radius:16px;padding:12px 16px;margin:12px 16px}
        .search-box svg{width:20px;height:20px;stroke:var(--text3);stroke-width:2;fill:none;flex-shrink:0}
        .search-box input{background:none;border:none;color:var(--text);font-size:1rem;outline:none;flex:1;font-family:inherit;min-height:44px}
        .search-box input::placeholder{color:var(--text3)}
        .sec-label{font-size:.7rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;padding:12px 16px}
        .creator-row{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);min-height:72px}
        .cr-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;background:var(--card);border:2px solid var(--border2);overflow:hidden}
        .cr-avatar img{width:100%;height:100%;object-fit:cover}
        .cr-name{font-weight:700;font-size:.95rem;color:var(--text);margin-bottom:2px}
        .cr-handle{font-size:.75rem;color:var(--text2)}
        .p-banner{height:140px;background:linear-gradient(135deg,#1a1400,#2a1f00,#1a1400);position:relative}
        .p-banner-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,transparent,rgba(10,10,10,.8))}
        .p-hero{padding:0 16px 16px;display:flex;flex-direction:column;align-items:center;text-align:center;margin-top:-40px}
        .p-avatar-wrap{width:80px;height:80px;border-radius:50%;border:2px solid var(--gold);background:var(--card);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.8rem;cursor:pointer;position:relative;margin-bottom:10px}
        .p-avatar-wrap img{width:100%;height:100%;object-fit:cover}
        .p-name{font-size:1.05rem;font-weight:900;color:var(--text)}
        .p-handle{font-size:.75rem;color:var(--gold);margin-bottom:6px}
        .p-bio{font-size:.8rem;color:var(--text2);line-height:1.6;max-width:280px;margin-bottom:14px}
        .p-stats{display:flex;gap:24px;margin-bottom:14px}
        .pst-n{font-size:1.1rem;font-weight:800;color:var(--text);text-align:center}
        .pst-l{font-size:.6rem;color:var(--text2);text-align:center;text-transform:uppercase;letter-spacing:.5px}
        .modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(20px);align-items:flex-end}
        .modal.open{display:flex}
        .mbox{background:var(--surface);border-radius:24px 24px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;border-top:2px solid var(--nav-border);animation:sup .3s ease;touch-action:pan-y}
        @keyframes sup{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
        .mhandle{width:40px;height:5px;background:var(--border2);border-radius:3px;margin:0 auto 20px;cursor:grab}
        .mtitle{font-size:1.1rem;font-weight:800;color:var(--text);text-align:center;margin-bottom:20px}
        .cmt-list{display:flex;flex-direction:column;gap:16px;max-height:50vh;overflow-y:auto;margin-bottom:16px}
        .cmt-item{display:flex;gap:12px}
        .cmt-av{width:36px;height:36px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;border:2px solid var(--border)}
        .cmt-name{font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:3px}
        .cmt-text{font-size:.85rem;color:var(--text2);line-height:1.5}
        .cmt-time{font-size:.65rem;color:var(--text3);margin-top:4px}
        .cmt-input{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--border2);border-radius:100px;padding:8px 16px}
        .cmt-input input{background:none;border:none;color:var(--text);font-size:.9rem;flex:1;outline:none;font-family:inherit;min-height:44px}
        .cmt-send{background:none;border:none;cursor:pointer;padding:8px;display:flex;min-width:44px;min-height:44px;align-items:center;justify-content:center}
        .cmt-send svg{width:22px;height:22px;stroke:var(--gold);stroke-width:2;fill:none}
        .toast{position:fixed;bottom:calc(80px + var(--sab));left:50%;transform:translateX(-50%) translateY(8px);z-index:999;background:rgba(201,168,76,.2);backdrop-filter:blur(30px);color:var(--gold);padding:12px 24px;border-radius:100px;font-size:.85rem;font-weight:700;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;border:2px solid rgba(201,168,76,.4)}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
        .btn-gold{width:100%;background:linear-gradient(135deg,#c9a84c,#e8c96d);color:#000;border:none;border-radius:14px;padding:16px;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px;min-height:56px}
        .fi{width:100%;background:var(--card);border:1.5px solid var(--border2);color:var(--text);padding:14px;border-radius:12px;font-size:.9rem;outline:none;font-family:inherit;transition:border-color .2s}
        .fi:focus{border-color:var(--gold)}
        .fi::placeholder{color:var(--text3)}
        textarea.fi{resize:vertical}
        .fl{display:block;font-size:.7rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
        .fg{margin-bottom:16px}
        .ferr{display:none;color:#ff2d55;font-size:.8rem;padding:10px 14px;background:rgba(255,45,85,.1);border-radius:10px;margin-bottom:12px}
        .upl-prog{display:none;margin-bottom:16px}
        .upl-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:8px 0}
        .upl-bar{height:100%;width:0;background:linear-gradient(90deg,#c9a84c,#e8c96d);border-radius:2px;transition:width .3s}
        .upl-suc{display:none;text-align:center;padding:20px;background:rgba(201,168,76,.08);border-radius:14px;border:1px solid rgba(201,168,76,.2);margin-bottom:16px}
        .dropzone{border:2px dashed rgba(201,168,76,.3);border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;margin-bottom:16px;transition:all .2s}
        .dropzone:active{border-color:var(--gold);background:var(--gold-dim)}
        .dz-ico{font-size:2.5rem;margin-bottom:10px}
        .dz-title{font-weight:700;color:var(--text);margin-bottom:6px}
        .file-info{display:none;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--border2);border-radius:12px;padding:12px;margin-bottom:16px}
        .file-info span{font-size:1.5rem}
        .file-rm{background:none;border:none;cursor:pointer;color:var(--text3);font-size:1rem;padding:4px}
        .load-more{display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;scroll-snap-align:start}
        .load-more-spinner{width:40px;height:40px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div id="page-feed" class="page active">
    <div class="feed-top">
        <div class="feed-top-row1">
            <div class="logo">KREVIO</div>
            <div class="feed-top-icons">
                <button class="icon-btn" id="theme-btn"><i data-lucide="sun"></i></button>
                <button class="icon-btn" id="auth-top-btn"><i data-lucide="user"></i></button>
            </div>
        </div>
        <div class="feed-tabs">
            <div class="feed-tab active" data-tab="trending">🔥 Trending</div>
            <div class="feed-tab" data-tab="following">👥 Following</div>
            <div class="feed-tab" data-tab="premium">💎 Премиум</div>
        </div>
    </div>
    <div class="feed-wrap" id="feed-wrap"></div>
</div>

<div id="page-search" class="page">
    <div class="page-header"><div class="page-title">ТЪРСИ</div></div>
    <div class="search-box"><i data-lucide="search"></i><input type="text" id="search-inp" placeholder="Търси творец или видео..."></div>
    <div id="search-list"></div>
</div>

<div id="page-inbox" class="page">
    <div class="page-header"><div class="page-title">ИЗВЕСТИЯ</div></div>
    <div id="inbox-list" style="padding:16px"></div>
</div>

<div id="page-profile" class="page">
    <div class="page-header">
        <div class="page-title">ПРОФИЛ</div>
        <button class="icon-btn" id="menu-open-btn"><i data-lucide="menu"></i></button>
    </div>
    <div id="profile-body"></div>
</div>

<div id="page-creator" class="page">
    <div class="page-header">
        <div class="page-title">CREATOR ПАНЕЛ</div>
        <button class="icon-btn" onclick="showPage('profile')"><i data-lucide="x"></i></button>
    </div>
    <div class="creator-panel-tabs" style="display:flex;gap:6px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--border)">
        <button class="cptab active" data-tab="cp-dashboard" style="padding:7px 14px;border-radius:100px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:none;white-space:nowrap;font-family:inherit;flex-shrink:0">📊 Табло</button>
        <button class="cptab" data-tab="cp-content" style="padding:7px 14px;border-radius:100px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:none;white-space:nowrap;font-family:inherit;flex-shrink:0">🎬 Съдържание</button>
        <button class="cptab" data-tab="cp-settings" style="padding:7px 14px;border-radius:100px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:none;white-space:nowrap;font-family:inherit;flex-shrink:0">⚙️ Настройки</button>
    </div>
    <div id="cp-dashboard" class="cp-section active" style="padding:16px">
        <div class="cp-stat-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
            <div class="cp-stat" style="background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:14px"><div class="cp-stat-val" style="font-size:1.4rem;font-weight:900;color:var(--gold)" id="cp-subscribers">0</div><div class="cp-stat-label" style="font-size:.68rem;color:var(--text2)">Абонати</div></div>
            <div class="cp-stat" style="background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:14px"><div class="cp-stat-val" style="font-size:1.4rem;font-weight:900;color:var(--gold)" id="cp-views">0</div><div class="cp-stat-label" style="font-size:.68rem;color:var(--text2)">Общо гледания</div></div>
            <div class="cp-stat" style="background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:14px"><div class="cp-stat-val" style="font-size:1.4rem;font-weight:900;color:var(--gold)" id="cp-followers">0</div><div class="cp-stat-label" style="font-size:.68rem;color:var(--text2)">Последователи</div></div>
            <div class="cp-stat" style="background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:14px"><div class="cp-stat-val" style="font-size:1.4rem;font-weight:900;color:var(--gold)" id="cp-video-count">0</div><div class="cp-stat-label" style="font-size:.68rem;color:var(--text2)">Видеа</div></div>
        </div>
    </div>
    <div id="cp-content" class="cp-section" style="display:none;padding:16px"><div id="cp-videos-list"></div></div>
    <div id="cp-settings" class="cp-section" style="display:none;padding:16px">
        <div class="cp-setting-row" style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="showToast('Скоро')"><span class="cp-setting-label">👤 Редактирай профил</span><span class="cp-setting-arrow">›</span></div>
        <div class="cp-setting-row" style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="showToast('Скоро')"><span class="cp-setting-label">💳 Метод на изплащане</span><span class="cp-setting-arrow">›</span></div>
    </div>
</div>

<nav class="botnav">
    <button class="bn active" id="bn-feed"><i data-lucide="house"></i><span>Начало</span></button>
    <button class="bn" id="bn-search"><i data-lucide="search"></i><span>Търси</span></button>
    <div class="bn-plus-wrap" id="bn-upload"><div class="bn-plus"><i data-lucide="plus"></i></div><span>Качи</span></div>
    <button class="bn" id="bn-inbox"><i data-lucide="bell"></i><span>Известия</span><div class="bn-badge" id="inbox-badge">0</div></button>
    <button class="bn" id="bn-profile"><i data-lucide="user"></i><span>Профил</span></button>
</nav>

<div class="modal" id="m-upload">
    <div class="mbox">
        <div class="mhandle" id="handle-upload"></div>
        <div class="mtitle">Качи видео</div>
        <div class="dropzone" id="upl-dz">
            <input type="file" id="upl-inp" style="display:none" accept="video/*">
            <div class="dz-ico">🎬</div><div class="dz-title">Избери видео</div>
        </div>
        <div class="file-info" id="upl-fi">
            <span>🎬</span>
            <div style="flex:1;min-width:0" id="upl-fi-name"></div>
            <button class="file-rm" id="upl-fi-rm">✕</button>
        </div>

function fmt(n){if(n>=1000000)return(n/1000000).toFixed(1)+"M";if(n>=1000)return(n/1000).toFixed(1)+"K";return n||0;}

function fmtTime(ts){if(!ts)return"";var d=new Date(ts),now=new Date(),diff=Math.floor((now-d)/1000);if(diff<60)return diff+"с";if(diff<3600)return Math.floor(diff/60)+"мин";if(diff<86400)return Math.floor(diff/3600)+"ч";return Math.floor(diff/86400)+"д";}

function resetFeed(){feedOffset=0;feedLoading=false;feedHasMore=true;if(feedObserver){feedObserver.disconnect();feedObserver=null;}}

// ═══════════════════ FEED С ПРИОРИТЕТ ═══════════════════
async function renderFeed(){

    wrap.innerHTML="";resetFeed();

    var sentinel=mk("div","load-more");sentinel.id="feed-sentinel";
    var spinner=mk("div","load-more-spinner");sentinel.appendChild(spinner);
    wrap.appendChild(sentinel);
    feedObserver=new IntersectionObserver(function(entries){if(entries[0].isIntersecting&&!feedLoading&&feedHasMore){loadMoreVideos();}},{threshold:0.1});
    feedObserver.observe(sentinel);
    lucide.createIcons();
}

async function loadMoreVideos(){
    if(feedLoading||!feedHasMore)return;
    feedLoading=true;
    var wrap=el("feed-wrap");if(!wrap){feedLoading=false;return;}
    var sentinel=el("feed-sentinel");
    var videos=[];
    if(sb){
        try{
            var r;
            if(currentTab==='following'&&ME){
                var fIds=Object.keys(followingSet).filter(function(k){return followingSet[k];});
                if(fIds.length===0){if(feedOffset===0){var empty=mk("div");empty.style.cssText="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(201,168,76,.4);text-align:center;padding:20px";empty.innerHTML="<div style='font-size:3rem;margin-bottom:16px'>👥</div><div style='font-size:1rem;font-weight:700;margin-bottom:8px;color:rgba(201,168,76,.6)'>Не следваш никого</div><div style='font-size:.82rem'>Следвай творци от Trending!</div>";wrap.insertBefore(empty,sentinel);}feedHasMore=false;feedLoading=false;return;}
                r=await sb.from("videos").select("*").in("user_id",fIds).order("created_at",{ascending:false}).range(feedOffset,feedOffset+feedBatchSize-1);
            }else{r=await sb.from("videos").select("*").order("created_at",{ascending:false}).range(feedOffset,feedOffset+feedBatchSize-1);}
            if(r.data)videos=r.data;
            if(!r.data||r.data.length<feedBatchSize)feedHasMore=false;
        }catch(e){feedLoading=false;return;}
    }
    if(feedOffset===0&&videos.length===0&&currentTab!=='following'){
        var empty=mk("div");empty.style.cssText="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(201,168,76,.4);text-align:center;padding:20px";
        empty.innerHTML="<div style='font-size:3rem;margin-bottom:16px'>🎬</div><div style='font-size:1rem;font-weight:700;margin-bottom:8px;color:rgba(201,168,76,.6)'>Все още няма видеа</div><div style='font-size:.82rem'>Бъди първият, който качи!</div>";
        wrap.insertBefore(empty,sentinel);feedLoading=false;return;
    }
    videos.sort(function(a,b){return((b.views||0)*0.7+(b.likes_count||0)*0.3)-((a.views||0)*0.7+(a.likes_count||0)*0.3);});
    videos.forEach(function(v,i){var card=buildVideo(v,feedOffset+i);if(sentinel)wrap.insertBefore(card,sentinel);else wrap.appendChild(card);});
    feedOffset+=videos.length;if(!feedHasMore&&sentinel)sentinel.style.display="none";feedLoading=false;cleanupOldVideos();lucide.createIcons();
}

function cleanupOldVideos(){var items=document.querySelectorAll('.video-item');if(items.length>MAX_VIDEOS_IN_DOM){for(var i=0;i<items.length-MAX_VIDEOS_IN_DOM;i++){var player=items[i].querySelector('video');if(player){player.pause();player.src='';player.load();}items[i].remove();}}}

// ═══════════════════ BUILD VIDEO ═══════════════════
function buildVideo(v,i){
    var item=mk("div","video-item");
    var vid=document.createElement("video");vid.className="v-player";vid.src=v.file_url;vid.loop=true;vid.muted=true;vid.playsInline=true;vid.preload="none";
    item.appendChild(vid);
    var gradient=mk("div","v-gradient");item.appendChild(gradient);
    var prog=mk("div","v-progress");var fill=mk("div","v-progress-fill");fill.id="prog-"+i;prog.appendChild(fill);item.appendChild(prog);
    vid.addEventListener("timeupdate",function(){if(vid.duration)fill.style.width=(vid.currentTime/vid.duration*100)+"%";});
    vid.addEventListener("click",function(){if(vid.paused)vid.play();else vid.pause();});
    new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)vid.play().catch(function(){});else vid.pause();});},{threshold:0.8}).observe(item);
    var infoZone=mk("div","v-info-zone");
    var creatorBar=mk("div","v-creator-bar");
    var cAv=mk("div","v-avatar");if(v.creator_avatar){var avImg=document.createElement("img");avImg.src=v.creator_avatar;cAv.appendChild(avImg);}else{cAv.textContent="🎬";}
    cAv.onclick=function(){if(ME&&v.user_id===ME.id)showPage("profile");else showToast("👤 Профил");};
    var cInfo=mk("div","v-creator-info");cInfo.innerHTML='<div class="v-creator-name">'+(v.creator_name||v.title||"Творец")+'</div><div class="v-creator-handle">@'+(v.creator_handle||"creator")+'</div>';
    var cBtns=mk("div","v-creator-btns");
    var followBtn=mk("button","v-follow-btn");
    if(followingSet[v.user_id]){followBtn.textContent="✓ Следваш";followBtn.classList.add("following");}else{followBtn.textContent="Следвай";}
    followBtn.onclick=async function(e){e.stopPropagation();if(!ME){el("m-auth").classList.add("open");return;}if(followingSet[v.user_id]){try{await sb.from("follows").delete().eq("follower_id",ME.id).eq("following_id",v.user_id);}catch(e){}followingSet[v.user_id]=false;followBtn.textContent="Следвай";followBtn.classList.remove("following");}else{try{await sb.from("follows").insert({follower_id:ME.id,following_id:v.user_id});}catch(e){}followingSet[v.user_id]=true;followBtn.textContent="✓ Следваш";followBtn.classList.add("following");}};
    cBtns.appendChild(followBtn);creatorBar.appendChild(cAv);creatorBar.appendChild(cInfo);creatorBar.appendChild(cBtns);
    infoZone.appendChild(creatorBar);
    if(v.description){var d=mk("div","v-title-text");d.textContent=v.description;infoZone.appendChild(d);}
    var tags=mk("div","v-tags");if(v.hashtags){v.hashtags.split(" ").forEach(function(t){var tg=mk("span","v-tag");tg.textContent=t;tags.appendChild(tg);});}else{var t1=mk("span","v-tag");t1.textContent="#krevio";tags.appendChild(t1);}
    infoZone.appendChild(tags);
    var actionBar=mk("div","v-action-bar");
    var likeBtn=mk("button","v-act");likeBtn.innerHTML='<i data-lucide="heart"></i><span>0</span>';likeBtn.onclick=function(){likeBtn.classList.toggle('liked');showToast(likeBtn.classList.contains('liked')?'❤️ Харесано':'💔 Премахнато');};actionBar.appendChild(likeBtn);
    var cmtBtn=mk("button","v-act");cmtBtn.innerHTML='<i data-lucide="message-circle"></i><span>0</span>';cmtBtn.onclick=function(){openComments(v.id);};actionBar.appendChild(cmtBtn);
    var saveBtn=mk("button","v-act");saveBtn.innerHTML='<i data-lucide="bookmark"></i><span>Запази</span>';saveBtn.onclick=function(){saveBtn.classList.toggle('saved');showToast(saveBtn.classList.contains('saved')?'🔖 Запазено':'Премахнато');};actionBar.appendChild(saveBtn);
    var shareBtn=mk("button","v-act");shareBtn.innerHTML='<i data-lucide="share-2"></i><span>Сподели</span>';shareBtn.onclick=function(){if(navigator.share)navigator.share({title:v.title});else showToast('📤 Копирано!');};actionBar.appendChild(shareBtn);
    infoZone.appendChild(actionBar);item.appendChild(infoZone);
    return item;
}

// ═══════════════════ ТЪРСАЧКА ═══════════════════
function bindSearch(){
    var inp=el("search-inp");if(!inp)return;
    inp.oninput=async function(){var q=this.value.trim();if(!q){renderSearch();return;}if(!sb)return;try{var [rp,rv]=await Promise.all([sb.from("profiles").select("*").or("username.ilike.%"+q+"%,full_name.ilike.%"+q+"%").limit(10),sb.from("videos").select("*").ilike("title","%"+q+"%").limit(10)]);renderResults(rp.data||[],rv.data||[]);}catch(e){}};
}
async function renderSearch(){var wrap=el("search-list");if(!wrap||!sb)return;wrap.innerHTML="";try{var {data}=await sb.from("profiles").select("*").limit(20);renderResults(data||[],[]);}catch(e){}}
function renderResults(profiles,videos){

    if(videos&&videos.length>0){has=true;var lbl2=mk("div","sec-label");lbl2.textContent="🎬 Видеа";wrap.appendChild(lbl2);videos.forEach(function(v){var row=mk("div","creator-row");var av=mk("div","cr-avatar");av.textContent="🎬";var nm=mk("div","cr-name");nm.textContent=v.title;row.appendChild(av);row.appendChild(nm);row.onclick=function(){showToast("▶ "+v.title);};wrap.appendChild(row);});}
    if(!has)wrap.innerHTML="<div style='text-align:center;padding:30px;color:var(--text2)'>Няма резултати</div>";
}

                row.innerHTML='<div class="cp-video-thumb" style="width:52px;height:36px;border-radius:6px;background:var(--card);overflow:hidden"><video src="'+v.file_url+'" style="width:100%;height:100%;object-fit:cover"></video></div><div style="flex:1"><div style="font-weight:600;font-size:.8rem;color:var(--text)">'+(v.title||"Без заглавие")+'</div><div style="font-size:.68rem;color:var(--text2)">👁 '+fmt(v.views||0)+'</div></div><div style="font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:100px;background:'+(v.access_level==="free"?'rgba(255,255,255,.08)':'var(--gold-dim)')+';color:'+(v.access_level==="free"?'var(--text2)':'var(--gold)')+'">'+(v.access_level==="free"?'Безплатно':'Премиум')+'</div>';
                list.appendChild(row);

// ═══════════════════ КАЧВАНЕ ═══════════════════
function resetUpload(){uplFile=null;el("upl-inp").value="";el("upl-dz").style.display="block";el("upl-fi").style.display="none";el("upl-prog").style.display="none";el("upl-suc").style.display="none";el("upl-go-btn").style.display="block";el("upl-cancel-btn").style.display="block";el("upl-bar").style.width="0";el("upl-title").value="";el("upl-desc").value="";el("upl-hashtags").value="";el("upl-access").value="free";}
function bindUpload(){
    el("upl-dz").onclick=function(){el("upl-inp").click();};
    el("upl-inp").onchange=function(){if(this.files&&this.files[0])setFile(this.files[0]);};
    el("upl-fi-rm").onclick=resetUpload;
    el("upl-go-btn").onclick=startUpload;
    el("upl-cancel-btn").onclick=function(){if(uplXhr){uplXhr.abort();uplXhr=null;}el("m-upload").classList.remove("open");resetUpload();};
    var handle=el("handle-upload"),startY=0;
    if(handle){handle.addEventListener("touchstart",function(e){startY=e.touches[0].clientY;},{passive:true});handle.addEventListener("touchend",function(e){if(e.changedTouches[0].clientY-startY>50){el("m-upload").classList.remove("open");resetUpload();}},{passive:true});}
}
function setFile(f){uplFile=f;el("upl-dz").style.display="none";el("upl-fi").style.display="flex";document.getElementById("upl-fi-name").innerHTML="<div style='font-weight:600;font-size:.82rem;color:var(--text)'>"+f.name+"</div><div style='font-size:.67rem;color:var(--text2)'>"+fmtBytes(f.size)+"</div>";}
async function startUpload(){
    if(!uplFile){showToast("Избери видео!");return;}var tit=el("upl-title");if(!tit.value.trim()){showToast("Въведи заглавие!");return;}var token="";if(sb){try{var s=await sb.auth.getSession();if(s.data&&s.data.session)token=s.data.session.access_token;}catch(e){}}if(!token){showToast("Влез в акаунта!");return;}
    el("upl-go-btn").style.display="none";el("upl-cancel-btn").style.display="none";el("upl-prog").style.display="block";
    try{
        var accessMap={free:"free",paid:"fan",subscribers:"studio"};
        var pr=await fetch(BACKEND+"/presign",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({fileName:uplFile.name,mimeType:uplFile.type,title:tit.value.trim(),description:el("upl-desc").value,hashtags:el("upl-hashtags").value,access:accessMap[el("upl-access").value]||"free"})});
        var pd=await pr.json();if(!pr.ok){el("upl-go-btn").style.display="block";el("upl-cancel-btn").style.display="block";showToast("❌ "+(pd.error||"Грешка"));return;}
        uplXhr=new XMLHttpRequest();uplXhr.open("PUT",pd.uploadUrl,true);uplXhr.setRequestHeader("Content-Type",uplFile.type);
        uplXhr.upload.onprogress=function(e){if(e.lengthComputable){var p=Math.round(e.loaded/e.total*100);el("upl-bar").style.width=p+"%";}};
        uplXhr.onload=function(){uplXhr=null;if(this.status===200){el("upl-prog").style.display="none";el("upl-suc").style.display="block";showToast("✅ Качено!");setTimeout(function(){el("m-upload").classList.remove("open");resetUpload();renderFeed();},1500);}else{el("upl-go-btn").style.display="block";el("upl-cancel-btn").style.display="block";showToast("❌ Грешка");}};
        uplXhr.onerror=function(){uplXhr=null;el("upl-go-btn").style.display="block";el("upl-cancel-btn").style.display="block";showToast("❌ Мрежова грешка");};
        uplXhr.send(uplFile);
    }catch(err){el("upl-go-btn").style.display="block";el("upl-cancel-btn").style.display="block";showToast("❌ "+err.message);}
}

// ═══════════════════ КОМЕНТАРИ ═══════════════════
async function openComments(videoId){currentVideoId=videoId;var list=el("cmt-list");if(!list)return;list.innerHTML="<div style='text-align:center;padding:20px;color:var(--text2)'>Зарежда...</div>";el("m-comments").classList.add("open");lucide.createIcons();await loadComments(videoId);}
async function loadComments(videoId){var list=el("cmt-list");if(!list||!sb)return;try{var r=await sb.from("comments").select("*").eq("video_id",videoId).order("created_at",{ascending:true}).limit(50);list.innerHTML="";if(!r.data||r.data.length===0){list.innerHTML="<div style='text-align:center;padding:20px;color:var(--text2)'>Няма коментари</div>";return;}r.data.forEach(function(c){var item=mk("div","cmt-item");item.innerHTML='<div class="cmt-av">👤</div><div><div class="cmt-name">'+(c.username||"Потребител")+'</div><div class="cmt-text">'+c.text+'</div><div class="cmt-time">'+fmtTime(c.created_at)+' назад</div></div>';list.appendChild(item);});}catch(e){}}

// ═══════════════════ АВТЕНТИКАЦИЯ ═══════════════════
function bindAuth(){
    el("auth-login-btn").onclick=async function(){var email=el("auth-email").value.trim();var pass=el("auth-pass").value;if(!email||!pass){showToast("Попълни имейл и парола");return;}var {data,error}=await sb.auth.signInWithPassword({email:email,password:pass});if(error){showToast("❌ "+error.message);return;}ME={id:data.user.id,email:data.user.email,name:data.user.user_metadata?.name||email.split("@")[0]};await loadProfile();await loadFollowing();updateProfileIcon();el("m-auth").classList.remove("open");showToast("👋 Здравей, "+ME.name+"!");renderFeed();renderProfile();};
    el("auth-register-btn").onclick=async function(){var email=el("auth-email").value.trim();var pass=el("auth-pass").value;if(!email||!pass){showToast("Попълни имейл и парола");return;}if(pass.length<8){showToast("Парола поне 8 символа");return;}var {data,error}=await sb.auth.signUp({email:email,password:pass,options:{data:{name:email.split("@")[0]}}});if(error){showToast("❌ "+error.message);return;}if(data?.user){await sb.from("profiles").insert({id:data.user.id,username:email.split("@")[0].toLowerCase(),full_name:email.split("@")[0]});}el("m-auth").classList.remove("open");showToast("✅ Провери имейла!");};
}

// ═══════════════════ МОДАЛИ ═══════════════════
function bindModals(){document.querySelectorAll('.modal').forEach(function(m){m.addEventListener('click',function(e){if(e.target===m)m.classList.remove('open');});});}

// ═══════════════════ ПРОФИЛ ═══════════════════
async function renderProfile(){
    var wrap=el("profile-body");if(!wrap)return;
    if(!ME){wrap.innerHTML="<div style='padding:60px 20px;text-align:center'><div style='font-size:3rem;margin-bottom:16px'>👤</div><div style='font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--text)'>Влез в акаунта си</div><button class='btn-gold' style='width:auto;padding:12px 32px;margin:0 auto' onclick=\"el('m-auth').classList.add('open')\">Вход / Регистрация</button></div>";return;}
    var myVideosCount=0;if(sb){try{var {count}=await sb.from("videos").select("id",{count:"exact"}).eq("user_id",ME.id);myVideosCount=count||0;}catch(e){}}
    wrap.innerHTML='<div class="p-banner"><div class="p-banner-gradient"></div></div><div class="p-hero"><div class="p-avatar-wrap">'+(ME.avatar?'<img src="'+ME.avatar+'">':'👤')+'</div><div class="p-name">'+(ME.username||ME.name)+'</div><div class="p-handle">@'+(ME.username||ME.name).toLowerCase().replace(/\s+/g,"_")+'</div><div class="p-bio">'+(ME.bio||"Добави биография")+'</div><div class="p-stats"><div><div class="pst-n">'+myVideosCount+'</div><div class="pst-l">Видеа</div></div><div><div class="pst-n">0</div><div class="pst-l">Фена</div></div><div><div class="pst-n">'+Object.keys(followingSet).filter(function(k){return followingSet[k];}).length+'</div><div class="pst-l">Следва</div></div></div><button class="btn-gold" onclick="showPage(\'creator\')" style="width:auto;padding:12px 32px">🎬 Creator Панел</button><button class="btn-gold" onclick="logout()" style="background:var(--card);color:#fff;width:auto;padding:12px 32px;margin-top:8px">🚪 Изход</button></div>';
}

async function logout(){if(sb)await sb.auth.signOut();ME=null;followingSet={};updateProfileIcon();renderProfile();renderFeed();showToast("👋 Излязохте!");}

function renderInbox(){var wrap=el("inbox-list");if(!wrap)return;wrap.innerHTML="";var n=[{ico:"❤️",text:"Добре дошъл в Krevio!",time:"Сега",unread:true}];n.forEach(function(n){var item=mk("div","creator-row");item.innerHTML='<div class="cr-avatar" style="font-size:1.5rem">'+n.ico+'</div><div style="flex:1"><div class="cr-name">'+n.text+'</div><div class="cr-handle">'+n.time+'</div></div>'+(n.unread?'<div style="width:10px;height:10px;background:#c9a84c;border-radius:50%"></div>':'');wrap.appendChild(item);});}
function updateInboxBadge(){var badge=el("inbox-badge");if(!badge)return;var c=inboxMessages.filter(function(m){return m.unread;}).length;if(c>0){badge.textContent=c;badge.style.display="flex";}else badge.style.display="none";}
</script>
</body>

<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Krevio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#000;color:#fff}

/* Страници */
.page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;overflow-y:auto}
.page.active{display:block}

/* Header */
.header{position:sticky;top:0;z-index:10;background:#000;padding:16px;border-bottom:1px solid #222}
.logo{font-size:28px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#c9a84c,#e8c96d);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Табове */
.tabs{display:flex;gap:8px;margin-top:12px}
.tab{flex:1;text-align:center;padding:12px;background:#111;border-radius:30px;font-size:14px;font-weight:600;color:#888;cursor:pointer}
.tab.active{background:linear-gradient(135deg,#c9a84c,#e8c96d);color:#000}

/* Видео */
.video-container{height:calc(100vh - 140px);overflow-y:scroll;scroll-snap-type:y mandatory}
.video-item{height:100%;scroll-snap-align:start;position:relative}
.video-player{width:100%;height:100%;object-fit:cover}
.video-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(to top,#000,transparent)}
.creator{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.avatar{width:40px;height:40px;border-radius:50%;border:2px solid #c9a84c;display:flex;align-items:center;justify-content:center;font-size:20px;background:#222}
.creator-name{font-weight:700;font-size:16px}
.creator-handle{font-size:12px;color:#aaa}
.video-title{font-size:14px;margin-bottom:16px}

/* Бутони за действия */
.actions{display:flex;justify-content:space-around;margin-top:12px}
.action-btn{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:12px;display:flex;flex-direction:column;align-items:center;gap:4px}
.action-btn span{font-size:12px}
.action-btn.liked{color:#ff2d55}

/* Долна навигация */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:#111;padding:12px;border-top:1px solid #222}
.nav-btn{background:none;border:none;color:#666;font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav-btn.active{color:#c9a84c}
.nav-btn span{font-size:20px}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#c9a84c;color:#000;padding:12px 24px;border-radius:30px;font-weight:700;z-index:1000;display:none}
.toast.show{display:block}
</style>
</head>
<body>

<!-- FEED PAGE -->
<div id="page-feed" class="page active">
  <div class="header">
    <div class="logo">KREVIO</div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab(this)">🔥 Trending</div>
      <div class="tab" onclick="switchTab(this)">👥 Following</div>
      <div class="tab" onclick="switchTab(this)">💎 Премиум</div>
    </div>
  </div>
  <div class="video-container" id="video-container"></div>
</div>

<!-- SEARCH PAGE -->
<div id="page-search" class="page">
  <div class="header">
    <div class="logo">ТЪРСИ</div>
  </div>
  <div style="padding:20px">
    <input type="text" placeholder="Търси..." style="width:100%;padding:16px;background:#111;border:1px solid #333;border-radius:12px;color:#fff;font-size:16px">
    <div style="text-align:center;margin-top:40px;color:#888">🔍 Започни да търсиш</div>
  </div>
</div>

<!-- INBOX PAGE -->
<div id="page-inbox" class="page">
  <div class="header">
    <div class="logo">ИЗВЕСТИЯ</div>
  </div>
  <div style="padding:20px;text-align:center;color:#888;margin-top:40px">
    <div style="font-size:48px;margin-bottom:20px">🔔</div>
    <div>Няма нови известия</div>
  </div>
</div>

<!-- PROFILE PAGE -->
<div id="page-profile" class="page">
  <div class="header">
    <div class="logo">ПРОФИЛ</div>
  </div>
  <div style="padding:20px;text-align:center">
    <div style="font-size:64px;margin:30px 0">👤</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:12px">Влез в акаунта си</div>
    <div style="color:#888;margin-bottom:30px">За да видиш профила си</div>
    <button onclick="showToast('🔐 Вход')" style="background:#c9a84c;color:#000;border:none;padding:16px 40px;border-radius:30px;font-weight:700;font-size:16px;cursor:pointer">Вход / Регистрация</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('feed')"><span>🏠</span>Начало</button>
  <button class="nav-btn" onclick="showPage('search')"><span>🔍</span>Търси</button>
  <button class="nav-btn" onclick="showToast('📤 Качване')"><span>➕</span>Качи</button>
  <button class="nav-btn" onclick="showPage('inbox')"><span>🔔</span>Известия</button>
  <button class="nav-btn" onclick="showPage('profile')"><span>👤</span>Профил</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// Гарантирано работещи функции
function showPage(pageName){
  // Скрий всички страници
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  // Покажи избраната
  document.getElementById('page-'+pageName).classList.add('active');
  
  // Обнови навигацията
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  showToast(tab.textContent);
}

function showToast(text){
  var toast=document.getElementById('toast');
  toast.textContent=text;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2000);
}

// Инициализация при зареждане
window.onload=function(){
  console.log('Стартиране...');
  
  var container=document.getElementById('video-container');
  
  // Тестови видеа (ГАРАНТИРАНО РАБОТЕЩИ)
  var videos=[
    {title:'Залез над морето 🌅',creator:'Nature BG',handle:'nature_bg',url:'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4'},
    {title:'Планинско приключение 🏔️',creator:'Adventure Time',handle:'adventure',url:'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4'},
    {title:'Танци от България 💃',creator:'Folk Dance',handle:'folk_bg',url:'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4'}
  ];
  
  videos.forEach(function(v){
    var item=document.createElement('div');
    item.className='video-item';
    
    // Видео
    var vid=document.createElement('video');
    vid.className='video-player';
    vid.src=v.url;
    vid.loop=true;
    vid.muted=true;
    vid.playsInline=true;
    vid.setAttribute('playsinline','');
    item.appendChild(vid);
    
    // Overlay
    var overlay=document.createElement('div');
    overlay.className='video-overlay';
    
    // Creator info
    overlay.innerHTML=`
      <div class="creator">
        <div class="avatar">🎬</div>
        <div>
          <div class="creator-name">${v.creator}</div>
          <div class="creator-handle">@${v.handle}</div>
        </div>
      </div>
      <div class="video-title">${v.title}</div>
    `;
    
    // Бутони
    var actions=document.createElement('div');
    actions.className='actions';
    
    // Харесване
    var likeBtn=document.createElement('button');
    likeBtn.className='action-btn';
    likeBtn.innerHTML='<span>❤️</span><span>0</span>';
    likeBtn.onclick=function(){
      this.classList.toggle('liked');
      showToast(this.classList.contains('liked')?'❤️ Харесано!':'💔 Премахнато');
    };
    
    // Коментари
    var cmtBtn=document.createElement('button');
    cmtBtn.className='action-btn';
    cmtBtn.innerHTML='<span>💬</span><span>0</span>';
    cmtBtn.onclick=function(){showToast('💬 Коментари');};
    
    // Запази
    var saveBtn=document.createElement('button');
    saveBtn.className='action-btn';
    saveBtn.innerHTML='<span>🔖</span><span>Запази</span>';
    saveBtn.onclick=function(){showToast('🔖 Запазено!');};
    
    // Сподели
    var shareBtn=document.createElement('button');
    shareBtn.className='action-btn';
    shareBtn.innerHTML='<span>📤</span><span>Сподели</span>';
    shareBtn.onclick=function(){showToast('📤 Споделяне');};
    
    actions.appendChild(likeBtn);
    actions.appendChild(cmtBtn);
    actions.appendChild(saveBtn);
    actions.appendChild(shareBtn);
    
    overlay.appendChild(actions);
    item.appendChild(overlay);
    container.appendChild(item);
    
    // Клик за пауза/плей
    vid.onclick=function(){
      if(vid.paused){
        vid.play();
      }else{
        vid.pause();
      }
    };
    
    // Двоен тап
    var lastTap=0;
    item.addEventListener('touchend',function(){
      var now=Date.now();
      if(now-lastTap<300){
        likeBtn.classList.add('liked');
        showToast('❤️❤️ Харесано!');
      }
      lastTap=now;
    });
  });
  
  // Autoplay при скрол
  var observer=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      var vid=entry.target.querySelector('video');
      if(vid){
        if(entry.isIntersecting){
          vid.play().catch(function(){});
        }else{
          vid.pause();
        }
      }
    });
  },{threshold:0.7});
  
  document.querySelectorAll('.video-item').forEach(function(item){
    observer.observe(item);
  });
  
  showToast('👋 Добре дошли в Krevio!');
};
</script>
</body>
</html>

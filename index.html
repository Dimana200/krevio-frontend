<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Krevio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
:root{
  --bg:#000;--surface:#111;--card:#1a1a1a;
  --text:#fff;--text2:rgba(255,255,255,.6);--text3:rgba(255,255,255,.3);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --red:#e8192c;--red-dim:rgba(232,25,44,.12);
  --nav-bg:rgba(0,0,0,.85);--nav-border:rgba(255,255,255,.08);
}
body.light{
  --bg:#f0f0f5;--surface:#fff;--card:#fff;
  --text:#111;--text2:rgba(0,0,0,.55);--text3:rgba(0,0,0,.3);
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);
  --nav-bg:rgba(255,255,255,.92);--nav-border:rgba(0,0,0,.08);
}
body{background:var(--bg);color:var(--text)}
.page{display:none;position:fixed;inset:0;z-index:1;background:var(--bg)}
.page.active{display:block}
.logo-k{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#e8192c;letter-spacing:2px;line-height:1;text-shadow:0 0 20px rgba(232,25,44,.4)}
.logo-full{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff;letter-spacing:4px;line-height:1}
body.light .logo-full{color:#111}
.v-player{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;cursor:pointer}
.v-play-overlay{position:absolute;inset:0;z-index:15;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s}
.v-play-overlay.show{opacity:1}
.v-play-circle{width:64px;height:64px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3)}
.v-play-circle svg{width:28px;height:28px;stroke:#fff;stroke-width:1.5;fill:none;margin-left:4px}
.v-progress{position:absolute;bottom:68px;left:0;right:0;height:3px;background:rgba(255,255,255,.2);z-index:16;cursor:pointer}
.v-progress-fill{height:100%;background:#e8192c;border-radius:2px;transition:width .1s linear;pointer-events:none}
.v-loading{position:absolute;inset:0;z-index:14;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3)}
.v-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
#page-feed{background:#000}
.feed-wrap{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}
.feed-wrap::-webkit-scrollbar{display:none}
.video-item{height:100vh;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
.v-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.v-bg-ico{font-size:6rem;opacity:.25}
.v-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.15) 45%,rgba(0,0,0,.35) 100%);pointer-events:none}
.feed-top{position:fixed;top:0;left:0;right:0;z-index:50;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent)}
.feed-top-right{display:flex;gap:12px;align-items:center}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center}
.icon-btn svg{width:24px;height:24px;stroke:#fff;stroke-width:1.5;fill:none}
.v-info{position:absolute;bottom:84px;left:0;right:72px;padding:0 14px;z-index:10}
.v-creator{display:flex;align-items:center;gap:9px;margin-bottom:9px;cursor:pointer}
.v-avatar{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;background:#222;overflow:hidden}
.v-avatar img{width:100%;height:100%;object-fit:cover}
.v-name{font-weight:700;font-size:.88rem;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.v-handle{font-size:.72rem;color:rgba(255,255,255,.6);margin-top:1px}
.v-title{font-size:.84rem;color:rgba(255,255,255,.88);line-height:1.5;margin-bottom:7px;text-shadow:0 1px 3px rgba(0,0,0,.4);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.v-tags{display:flex;gap:6px}
.v-tag{font-size:.74rem;color:rgba(255,255,255,.65);font-weight:600}
.v-plan-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(232,25,44,.8);backdrop-filter:blur(6px);border-radius:100px;padding:3px 9px;font-size:.7rem;font-weight:700;margin-bottom:7px;color:#fff}
.v-actions{position:absolute;right:10px;bottom:88px;display:flex;flex-direction:column;align-items:center;gap:18px;z-index:10}
.v-act-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:none;border:none;padding:0}
.v-act-btn svg{width:28px;height:28px;stroke:#fff;stroke-width:1.5;fill:none;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
.v-act-btn span{font-size:.68rem;color:#fff;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.v-act-avatar{width:44px;height:44px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;position:relative;background:#222;overflow:hidden}
.v-act-avatar img{width:100%;height:100%;object-fit:cover}
.v-follow-plus{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);background:#e8192c;border:none;border-radius:100px;padding:2px 7px;font-size:.58rem;font-weight:700;color:#fff;white-space:nowrap;cursor:pointer}
.v-music{display:none}
.v-ad{position:absolute;bottom:88px;left:14px;right:72px;z-index:10}
.ad-card{background:rgba(0,0,0,.55);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.ad-name{font-size:.82rem;font-weight:700;color:#fff}
.ad-text{font-size:.74rem;color:rgba(255,255,255,.65)}
.locked-ov{position:absolute;inset:0;z-index:20;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.locked-ov h3{font-size:1.05rem;font-weight:800;margin-bottom:6px;text-align:center;color:#fff}
.locked-ov p{font-size:.82rem;color:rgba(255,255,255,.55);margin-bottom:18px;text-align:center;max-width:220px;line-height:1.6}
.botnav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:68px;display:flex;justify-content:space-around;align-items:center;padding:0 4px 8px;background:var(--nav-bg);backdrop-filter:blur(24px);border-top:1px solid var(--nav-border)}
.bn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;padding:4px 10px;position:relative}
.bn svg{width:25px;height:25px;stroke:var(--text2);stroke-width:1.5;fill:none;transition:stroke .2s}
.bn span{font-size:.56rem;color:var(--text2);font-weight:500;letter-spacing:.3px;transition:color .2s;text-transform:uppercase}
.bn.active svg{stroke:var(--text)}
.bn.active span{color:var(--text)}
.bn-badge{position:absolute;top:0;right:4px;min-width:15px;height:15px;background:#e8192c;border-radius:100px;font-size:.52rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--bg);color:#fff}
.bn-plus-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.bn-plus{width:44px;height:30px;background:#e8192c;border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(232,25,44,.4)}
.bn-plus svg{width:20px;height:20px;stroke:#fff;stroke-width:2.5;fill:none}
.bn-plus-wrap span{font-size:.56rem;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.3px}
#page-search{overflow-y:auto;padding-top:68px;padding-bottom:76px}
.search-top{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--nav-bg);backdrop-filter:blur(20px);padding:12px 16px;border-bottom:1px solid var(--nav-border)}
.search-box{display:flex;align-items:center;gap:10px;background:var(--border);border-radius:10px;padding:9px 13px}
.search-box svg{width:17px;height:17px;stroke:var(--text2);stroke-width:1.5;fill:none;flex-shrink:0}
.search-box input{background:none;border:none;color:var(--text);font-size:.88rem;outline:none;flex:1;font-family:inherit}
.search-box input::placeholder{color:var(--text3)}
.sec-label{font-size:.68rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;padding:20px 16px 10px}
.creator-row{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .15s}
.creator-row:active{background:var(--border)}
.cr-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;background:var(--card);border:1px solid var(--border);overflow:hidden}
.cr-avatar img{width:100%;height:100%;object-fit:cover}
.cr-name{font-weight:700;font-size:.9rem;color:var(--text);margin-bottom:2px}
.cr-handle{font-size:.75rem;color:var(--text2)}
.cr-fans{font-size:.72rem;color:var(--text2);margin-left:auto;white-space:nowrap}
#page-inbox{overflow-y:auto;padding-top:68px;padding-bottom:76px}
.inbox-top{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--nav-bg);backdrop-filter:blur(20px);padding:14px 16px;border-bottom:1px solid var(--nav-border);display:flex;align-items:center;justify-content:space-between}
.inbox-top h2{font-size:1rem;font-weight:800;color:var(--text)}
.msg-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.msg-avatar{width:50px;height:50px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;position:relative;border:1px solid var(--border)}
.msg-online{position:absolute;bottom:2px;right:2px;width:10px;height:10px;border-radius:50%;background:#00e676;border:2px solid var(--bg)}
.msg-name{font-weight:700;font-size:.88rem;color:var(--text);margin-bottom:3px}
.msg-preview{font-size:.78rem;color:var(--text2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:200px}
.msg-time{font-size:.66rem;color:var(--text3);white-space:nowrap}
.msg-dot{width:8px;height:8px;border-radius:50%;background:#e8192c;flex-shrink:0}
#page-profile{overflow-y:auto;padding-bottom:76px}
.profile-top{position:sticky;top:0;z-index:50;background:var(--nav-bg);backdrop-filter:blur(20px);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--nav-border)}
.profile-top .icon-btn svg{stroke:var(--text)}
.profile-hero{padding:20px 16px;display:flex;flex-direction:column;align-items:center;text-align:center}
.p-avatar{width:82px;height:82px;border-radius:50%;background:var(--card);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:12px;overflow:hidden;position:relative;cursor:pointer}
.p-avatar img{width:100%;height:100%;object-fit:cover}
.p-avatar-edit{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);font-size:.6rem;color:#fff;text-align:center;padding:3px}
.p-name{font-size:1.1rem;font-weight:900;color:var(--text);letter-spacing:-.3px}
.p-handle{font-size:.8rem;color:var(--text2);margin-bottom:14px}
.p-stats{display:flex;gap:28px;margin-bottom:14px}
.pst-n{font-size:1.15rem;font-weight:800;color:var(--text);text-align:center}
.pst-l{font-size:.65rem;color:var(--text2);text-align:center;text-transform:uppercase;letter-spacing:.5px}
.p-bio{font-size:.83rem;color:var(--text2);line-height:1.7;max-width:290px;margin-bottom:16px}
.p-btns{display:flex;gap:8px;margin-bottom:20px}
.p-btns button{flex:1;padding:9px;border-radius:8px;font-size:.83rem;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text);font-family:inherit}
.p-btns .sub-btn{background:#e8192c;border-color:#e8192c;color:#fff}
.plan-scroll{display:flex;gap:8px;padding:0 16px 20px;overflow-x:auto}
.plan-scroll::-webkit-scrollbar{display:none}
.plan-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;min-width:140px;flex-shrink:0}
.plan-card.hot{border-color:#e8192c;background:var(--red-dim)}
.plan-price{font-size:1.2rem;font-weight:900;color:var(--text)}
.plan-name{font-size:.72rem;color:var(--text2);margin-bottom:9px}
.p-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:2px}
.p-tab{flex:1;padding:11px;font-size:.8rem;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;text-align:center}
.p-tab.active{color:var(--text);border-bottom-color:var(--text)}
.vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.vg-cell{aspect-ratio:9/16;background:var(--card);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
.vg-ico{font-size:1.4rem;opacity:.4;position:relative;z-index:1}
.vg-bg{position:absolute;inset:0}
.vg-views{position:absolute;bottom:4px;left:5px;font-size:.64rem;color:#fff;z-index:2}
.modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);align-items:flex-end}
.modal.open{display:flex}
.mbox{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;border-top:1px solid var(--border);animation:sup .3s ease}
@keyframes sup{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.mhandle{width:34px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.mtitle{font-size:1rem;font-weight:800;color:var(--text);text-align:center;margin-bottom:18px}
.cmt-list{display:flex;flex-direction:column;gap:12px;max-height:45vh;overflow-y:auto;margin-bottom:14px}
.cmt-item{display:flex;gap:9px}
.cmt-av{width:32px;height:32px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;border:1px solid var(--border);overflow:hidden}
.cmt-av img{width:100%;height:100%;object-fit:cover}
.cmt-name{font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:2px}
.cmt-text{font-size:.82rem;color:var(--text2);line-height:1.5}
.cmt-time{font-size:.65rem;color:var(--text3);margin-top:2px}
.cmt-input{display:flex;align-items:center;gap:8px;background:var(--border);border-radius:100px;padding:8px 12px}
.cmt-input input{background:none;border:none;color:var(--text);font-size:.84rem;flex:1;outline:none;font-family:inherit}
.cmt-send{background:none;border:none;cursor:pointer;padding:0;display:flex}
.cmt-send svg{width:19px;height:19px;stroke:#e8192c;stroke-width:2;fill:none}
.dropzone{border:2px dashed var(--border2);border-radius:14px;padding:34px 20px;text-align:center;cursor:pointer;margin-bottom:14px;transition:all .2s}
.dropzone:hover,.dropzone.over{border-color:#e8192c;background:var(--red-dim)}
.dz-ico{font-size:2.4rem;margin-bottom:8px}
.dz-title{font-weight:700;color:var(--text);margin-bottom:4px}
.dz-sub{font-size:.78rem;color:var(--text2)}
.fg{margin-bottom:12px}
.fl{display:block;font-size:.65rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.fi{width:100%;background:var(--border);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:9px;font-size:.88rem;outline:none;font-family:inherit;transition:border-color .2s}
.fi:focus{border-color:#e8192c}
.fi::placeholder{color:var(--text3)}
textarea.fi{resize:vertical}
.fsel{width:100%;background:var(--border);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:9px;font-size:.88rem;outline:none;font-family:inherit}
.ferr{display:none;color:#e8192c;font-size:.78rem;padding:8px 12px;background:var(--red-dim);border-radius:7px;margin-bottom:10px}
.upl-prog{display:none;margin-bottom:12px}
.upl-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:6px 0}
.upl-bar{height:100%;width:0;background:#e8192c;border-radius:2px;transition:width .3s}
.upl-suc{display:none;text-align:center;padding:18px;background:rgba(0,230,118,.08);border-radius:12px;border:1px solid rgba(0,230,118,.2);margin-bottom:12px}
.auth-switch{display:flex;background:var(--border);border-radius:10px;padding:3px;margin-bottom:18px}
.auth-sw-btn{flex:1;padding:8px;text-align:center;font-size:.83rem;font-weight:600;cursor:pointer;border-radius:8px;color:var(--text2);background:none;border:none;font-family:inherit}
.auth-sw-btn.active{background:var(--card);color:var(--text)}
.btn-red{width:100%;background:#e8192c;color:#fff;border:none;border-radius:10px;padding:13px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.btn-ghost{width:100%;background:var(--card);color:var(--text);border:1px solid var(--border2);border-radius:10px;padding:12px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.btn-sm-red{background:#e8192c;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit}
.menu-item{display:flex;align-items:center;gap:13px;padding:14px 2px;border-bottom:1px solid var(--border);cursor:pointer}
.menu-item:last-child{border:none}
.menu-item svg{width:19px;height:19px;stroke:var(--text2);stroke-width:1.5;fill:none;flex-shrink:0}
.menu-item-label{font-size:.88rem;color:var(--text)}
.menu-item-arrow{margin-left:auto;color:var(--text3);font-size:.8rem}
.menu-danger svg{stroke:#e8192c}
.menu-danger .menu-item-label{color:#e8192c}
.file-info{display:none;align-items:center;gap:9px;background:var(--border);border-radius:9px;padding:9px 12px;margin-bottom:12px}
.file-rm{background:none;border:none;cursor:pointer;color:var(--text2);font-size:.9rem;padding:0}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);z-index:999;background:rgba(30,30,30,.92);backdrop-filter:blur(16px);color:#fff;padding:9px 18px;border-radius:100px;font-size:.8rem;font-weight:600;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,.1)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.upl-row{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:4px;color:var(--text)}
.upl-pct{font-weight:700;color:#e8192c}
.upl-spd{font-size:.68rem;color:var(--text2)}
.notif-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.notif-av{width:40px;height:40px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.notif-txt{font-size:.82rem;color:var(--text);flex:1;line-height:1.4}
.notif-time{font-size:.65rem;color:var(--text3);white-space:nowrap}
.notif-unread{width:8px;height:8px;border-radius:50%;background:#e8192c;flex-shrink:0}
</style>
</head>
<body>
<div id="page-feed" class="page active">
  <div class="feed-top">
    <div class="logo-k">K</div>
    <div class="feed-top-right">
      <button class="icon-btn" id="theme-btn"><i data-lucide="sun"></i></button>
      <button class="icon-btn" id="auth-top-btn"><i data-lucide="user"></i></button>
    </div>
  </div>
  <div class="feed-wrap" id="feed-wrap"></div>
</div>
<div id="page-search" class="page">
  <div class="search-top">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="logo-full">KREVIO</div>
    </div>
    <div class="search-box">
      <i data-lucide="search"></i>
      <input type="text" id="search-inp" placeholder="Търси творец...">

function buildVideo(v,i){
  var item=mk("div","video-item");
  var vid=document.createElement("video");
  vid.className="v-player";
  vid.src=v.file_url;
  vid.loop=true;
  vid.muted=true;
  vid.playsInline=true;
  vid.preload="metadata";
  item.appendChild(vid);

  var loading=mk("div","v-loading");loading.id="loading-"+i;loading.appendChild(mk("div","v-spinner"));item.appendChild(loading);
  var playOv=mk("div","v-play-overlay");playOv.id="playov-"+i;
  var circle=mk("div","v-play-circle");circle.innerHTML="<svg viewBox='0 0 24 24'><polygon points='6,3 20,12 6,21' fill='white'/></svg>";
  playOv.appendChild(circle);item.appendChild(playOv);
  var prog=mk("div","v-progress");var fill=mk("div","v-progress-fill");fill.id="prog-"+i;prog.appendChild(fill);item.appendChild(prog);

  vid.addEventListener("loadeddata",function(){var l=el("loading-"+i);if(l)l.style.display="none";});
  vid.addEventListener("timeupdate",function(){var f=el("prog-"+i);if(f&&vid.duration)f.style.width=(vid.currentTime/vid.duration*100)+"%";});
  vid.addEventListener("click",function(){
    audioUnlocked=true;
    vid.muted=false;
    if(vid.paused){vid.play();var po=el("playov-"+i);if(po){po.classList.add("show");setTimeout(function(){po.classList.remove("show");},600);}}
    else{vid.pause();var po=el("playov-"+i);if(po)po.classList.add("show");}
  });
  prog.addEventListener("click",function(e){var rect=prog.getBoundingClientRect();vid.currentTime=((e.clientX-rect.left)/rect.width)*vid.duration;});

  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        currentVideoId=v.id;
        vid.muted=!audioUnlocked;
        vid.play().catch(function(){vid.muted=true;vid.play().catch(function(){});});
      } else {
        vid.pause();
        vid.currentTime=0;
      }
    });
  },{threshold:0.8});
  obs.observe(item);

  item.appendChild(mk("div","v-gradient"));

  if(v.access_level!=="free"){
    var lkOv=mk("div","locked-ov");
    var lkH=mk("h3");lkH.textContent="Ексклузивно съдържание";lkOv.appendChild(lkH);
    var lkP=mk("p");lkP.textContent="Абонирай се за да гледаш";lkOv.appendChild(lkP);
    var lkBtn=mk("button");lkBtn.textContent="Абонирай се";lkBtn.style.cssText="background:#e8192c;color:#fff;border:none;border-radius:10px;padding:11px 24px;font-size:.88rem;font-weight:700;cursor:pointer";
    lkBtn.onclick=function(){el("m-auth").classList.add("open");lucide.createIcons();};lkOv.appendChild(lkBtn);item.appendChild(lkOv);
  }

  var acts=mk("div","v-actions");
  var avDiv=mk("div","v-act-avatar");
  if(v.avatar_url){var avImg=document.createElement("img");avImg.src=v.avatar_url;avDiv.appendChild(avImg);}
  else avDiv.textContent="🎬";
  var plusDiv=mk("div","v-follow-plus");plusDiv.textContent="Следвай";plusDiv.onclick=function(e){e.stopPropagation();showToast("Следваш!");};
  avDiv.appendChild(plusDiv);acts.appendChild(avDiv);

  var likeBtn=mk("button","v-act-btn");
  var likeIco=icon("heart",28);likeIco.style.cssText="width:28px;height:28px;stroke:#fff;stroke-width:1.5;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))";
  var likeCnt=mk("span");likeCnt.textContent=fmt(v.likes||0);
  likeBtn.appendChild(likeIco);likeBtn.appendChild(likeCnt);
  likeBtn.onclick=function(){likedSet[i]=!likedSet[i];likeIco.style.fill=likedSet[i]?"#e8192c":"none";likeIco.style.stroke=likedSet[i]?"#e8192c":"#fff";likeCnt.textContent=fmt((v.likes||0)+(likedSet[i]?1:0));};
  acts.appendChild(likeBtn);

  var cmtBtn=mk("button","v-act-btn");
  var cmtIco=icon("message-circle",28);cmtIco.style.cssText="width:28px;height:28px;stroke:#fff;stroke-width:1.5;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))";
  var cmtCnt=mk("span");cmtCnt.textContent="0";
  cmtBtn.appendChild(cmtIco);cmtBtn.appendChild(cmtCnt);
  cmtBtn.onclick=function(){openComments(v.id);};
  acts.appendChild(cmtBtn);

  var saveBtn=mk("button","v-act-btn");
  var saveIco=icon("bookmark",28);saveIco.style.cssText="width:28px;height:28px;stroke:#fff;stroke-width:1.5;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))";
  var saveCnt=mk("span");saveCnt.textContent="0";
  saveBtn.appendChild(saveIco);saveBtn.appendChild(saveCnt);
  saveBtn.onclick=function(){savedSet[i]=!savedSet[i];saveIco.style.fill=savedSet[i]?"#fff":"none";showToast(savedSet[i]?"Запазено!":"Премахнато");};
  acts.appendChild(saveBtn);

  acts.appendChild(shareBtn);

  var creator=mk("div","v-creator");

async function openComments(videoId){
  currentVideoId=videoId;
  var list=el("cmt-list");if(!list)return;
  list.innerHTML="<div style='text-align:center;padding:20px;color:var(--text2)'>Зарежда...</div>";
  el("m-comments").classList.add("open");
  lucide.createIcons();
  if(!sb||!videoId)return;
  try{
    var r=await sb.from("comments").select("*").eq("video_id",videoId).order("created_at",{ascending:true}).limit(50);
    list.innerHTML="";
    if(!r.data||r.data.length===0){
      list.innerHTML="<div style='text-align:center;padding:20px;color:var(--text2)'>Няма коментари. Бъди първи!</div>";
      return;
    }
    r.data.forEach(function(c){
      var item=mk("div","cmt-item");
      var av=mk("div","cmt-av");av.textContent="👤";
      var body=mk("div");
      var nm=mk("div","cmt-name");nm.textContent=c.username||"Потребител";
      var tx=mk("div","cmt-text");tx.textContent=c.text;
      var tm=mk("div","cmt-time");tm.textContent=fmtTime(c.created_at)+" назад";
      body.appendChild(nm);body.appendChild(tx);body.appendChild(tm);
      item.appendChild(av);item.appendChild(body);
      list.appendChild(item);
    });
  }catch(e){list.innerHTML="<div style='text-align:center;padding:20px;color:var(--text2)'>Грешка при зареждане</div>";}
}

  try{
    await sb.from("comments").insert({video_id:currentVideoId,user_id:ME.id,username:ME.name,text:text});
    showToast("Коментарът е добавен!");
    openComments(currentVideoId);
  }catch(e){showToast("Грешка!");}
});

// ТЪРСЕНЕ
async function renderSearch(){
  var wrap=el("search-list");if(!wrap)return;
  wrap.innerHTML="<div style='text-align:center;padding:20px;color:var(--text2)'>Зарежда...</div>";
  if(!sb){wrap.innerHTML="";return;}
  try{
    var r=await sb.from("profiles").select("*").limit(20);
    renderCreatorList(r.data||[]);
  }catch(e){wrap.innerHTML="";}
  el("search-inp").oninput=async function(){
    var q=this.value.trim();
    if(!q){renderSearch();return;}
    var r=await sb.from("profiles").select("*").ilike("username","%"+q+"%").limit(20);
    renderCreatorList(r.data||[]);
  };
}

function renderCreatorList(list){
  var wrap=el("search-list");if(!wrap)return;
  wrap.innerHTML="";
  if(list.length===0){
    wrap.innerHTML="<div style='text-align:center;padding:30px;color:var(--text2)'>Няма намерени творци</div>";
    return;
  }
  list.forEach(function(c){
    var row=mk("div","creator-row");
    var av=mk("div","cr-avatar");
    if(c.avatar_url){var img=document.createElement("img");img.src=c.avatar_url;av.appendChild(img);}
    else av.textContent="👤";
    var info=mk("div");info.style.flex="1";
    var nm=mk("div","cr-name");nm.textContent=c.username||c.full_name||"Потребител";
    var hd=mk("div","cr-handle");hd.textContent="@"+(c.username||"user");
    info.appendChild(nm);info.appendChild(hd);
    var fans=mk("div","cr-fans");fans.textContent=(c.followers_count||0)+" фена";
    row.appendChild(av);row.appendChild(info);row.appendChild(fans);
    row.onclick=function(){showToast("Профил скоро!");};
    wrap.appendChild(row);
  });
}

// ИЗВЕСТИЯ
async function renderInbox(){
  var wrap=el("inbox-list");if(!wrap)return;
  wrap.innerHTML="";
  var notifs=[
    {ico:"❤️",text:"Някой хареса твоето видео",time:"2 мин",unread:true},
    {ico:"💬",text:"Нов коментар на твоето видео",time:"1 ч",unread:true},
    {ico:"👤",text:"Нов последовател",time:"вчера",unread:false},
    {ico:"⭐",text:"Добре дошъл в Krevio!",time:"2 дни",unread:false}
  ];
  notifs.forEach(function(n){
    var item=mk("div","notif-item");
    var av=mk("div","notif-av");av.textContent=n.ico;
    var txt=mk("div","notif-txt");txt.textContent=n.text;
    var time=mk("div","notif-time");time.textContent=n.time;
    item.appendChild(av);item.appendChild(txt);item.appendChild(time);
    if(n.unread){var dot=mk("div","notif-unread");item.appendChild(dot);}

}

// ПРОФИЛ
async function renderProfile(){
  var wrap=el("profile-body");if(!wrap)return;
  wrap.innerHTML="";

  if(!ME){
    var loginMsg=mk("div");
    loginMsg.style.cssText="padding:60px 20px;text-align:center";
    loginMsg.innerHTML="<div style='font-size:3rem;margin-bottom:16px'>👤</div><div style='font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--text)'>Влез в акаунта си</div><div style='font-size:.82rem;color:var(--text2);margin-bottom:20px'>За да видиш профила си</div>";
    var loginBtn=mk("button","btn-red");loginBtn.style.cssText="width:auto;padding:12px 32px;margin:0 auto;display:block";loginBtn.textContent="Вход / Регистрация";
    loginBtn.onclick=function(){el("m-auth").classList.add("open");lucide.createIcons();};
    loginMsg.appendChild(loginBtn);wrap.appendChild(loginMsg);
    lucide.createIcons();return;
  }

  var hero=mk("div","profile-hero");
  var av=mk("div","p-avatar");
  if(ME.avatar){var avImg=document.createElement("img");avImg.src=ME.avatar;av.appendChild(avImg);}
  else{av.textContent="👤";}
  var avEdit=mk("div","p-avatar-edit");avEdit.textContent="Смени";
  av.appendChild(avEdit);
  av.onclick=function(){el("upl-avatar-inp").click();};

  var avatarInp=document.createElement("input");
  avatarInp.type="file";avatarInp.accept="image/*";avatarInp.id="upl-avatar-inp";avatarInp.style.display="none";
  avatarInp.onchange=async function(){
    if(!this.files||!this.files[0])return;
    showToast("Качване на снимката...");
    var file=this.files[0];
    var ext=file.name.split(".").pop();
    var path="avatars/"+ME.id+"."+ext;
    try{
      var r=await sb.storage.from("avatars").upload(path,file,{upsert:true});
      if(r.error){showToast("Грешка!");return;}
      var url=sb.storage.from("avatars").getPublicUrl(path).data.publicUrl;
      await sb.from("profiles").upsert({id:ME.id,avatar_url:url});
      ME.avatar=url;
      showToast("✅ Снимката е сменена!");
      renderProfile();
    }catch(e){showToast("Грешка!");}
  };
  document.body.appendChild(avatarInp);

  var nm=mk("div","p-name");nm.textContent=ME.username||ME.name;
  var hd=mk("div","p-handle");hd.textContent="@"+(ME.username||ME.name.toLowerCase().replace(/\s/g,"_"));

  var stats=mk("div","p-stats");
  var myVideos=0;
  if(sb){
    try{var rv=await sb.from("videos").select("id",{count:"exact"}).eq("user_id",ME.id);myVideos=rv.count||0;}catch(e){}
  }
  [{n:myVideos,l:"Видеа"},{n:0,l:"Фена"},{n:0,l:"Следва"}].forEach(function(s){
    var st=mk("div");
    var sn=mk("div","pst-n");sn.textContent=s.n;
    var sl=mk("div","pst-l");sl.textContent=s.l;
    st.appendChild(sn);st.appendChild(sl);stats.appendChild(st);
  });

  var bio=mk("p","p-bio");bio.textContent=ME.bio||"Добави биография в настройките";
  var btns=mk("div","p-btns");
  var editBtn=mk("button");editBtn.textContent="✏️ Редактирай";editBtn.onclick=function(){showToast("Скоро!");};
  btns.appendChild(editBtn);

  hero.appendChild(av);hero.appendChild(nm);hero.appendChild(hd);hero.appendChild(stats);hero.appendChild(bio);hero.appendChild(btns);
  wrap.appendChild(hero);

  var tabs=mk("div","p-tabs");
  var t1=mk("button","p-tab active");t1.textContent="Моите видеа";
  tabs.appendChild(t1);wrap.appendChild(tabs);

  var grid=mk("div","vgrid");grid.id="ptab-my-videos";
  if(sb){
    try{
      var rv2=await sb.from("videos").select("*").eq("user_id",ME.id).order("created_at",{ascending:false}).limit(12);
      if(rv2.data&&rv2.data.length>0){
        rv2.data.forEach(function(v){
          var cell=mk("div","vg-cell");
          var vidEl=document.createElement("video");
          vidEl.src=v.file_url;vidEl.style.cssText="position:absolute;inset:0;width:100%;height:100%;object-fit:cover";
          cell.appendChild(vidEl);
          var vw=mk("div","vg-views");vw.textContent=fmt(v.views||0);cell.appendChild(vw);
          cell.onclick=function(){showToast("▶ "+v.title);};
          grid.appendChild(cell);
        });
      } else {
        grid.innerHTML="<div style='grid-column:1/-1;padding:30px;text-align:center;color:var(--text2)'>Все още нямаш видеа</div>";
      }
    }catch(e){}
  }
  wrap.appendChild(grid);
  lucide.createIcons();
}

function bindAuth(){
  el("sw-login").onclick=function(){switchAuth("login");};
  el("sw-register").onclick=function(){switchAuth("register");};
  el("l-btn").onclick=doLogin;
  el("r-btn").onclick=doRegister;
}

function switchAuth(type){
  el("sw-login").classList.toggle("active",type==="login");
  el("sw-register").classList.toggle("active",type==="register");
  el("auth-login").style.display=type==="login"?"":"none";
  el("auth-register").style.display=type==="register"?"":"none";
}

async function doLogin(){
  var email=el("l-email").value.trim();var pass=el("l-pass").value;
  var err=el("l-err");var btn=el("l-btn");
  if(!email||!pass){err.textContent="Попълни имейл и парола.";err.style.display="block";return;}
  btn.textContent="Влизане...";btn.disabled=true;
  if(sb){
    var r=await sb.auth.signInWithPassword({email:email,password:pass});
    if(r.error){
      if(r.error.message.includes("Email not confirmed")){err.textContent="Потвърди имейла си първо!";}
      else{err.textContent="Грешни имейл или парола.";}
      err.style.display="block";btn.textContent="Вход →";btn.disabled=false;return;
    }
    var u=r.data.user;ME={id:u.id,email:u.email,name:u.user_metadata.name||u.email.split("@")[0]};
    await loadProfile();
  }
  el("m-auth").classList.remove("open");
  btn.textContent="Вход →";btn.disabled=false;
  showToast("👋 Добре дошъл, "+ME.name+"!");
}

async function doRegister(){
  var name=el("r-name").value.trim();var email=el("r-email").value.trim();var pass=el("r-pass").value;
  var err=el("r-err");var btn=el("r-btn");
  if(!name||!email||!pass){err.textContent="Попълни всички полета.";err.style.display="block";return;}
  if(pass.length<8){err.textContent="Паролата трябва да е поне 8 символа.";err.style.display="block";return;}
  btn.textContent="Регистрация...";btn.disabled=true;
  if(sb){
    var r=await sb.auth.signUp({email:email,password:pass,options:{data:{name:name}}});
    if(r.error){err.textContent=r.error.message;err.style.display="block";btn.textContent="Създай акаунт →";btn.disabled=false;return;}
    await sb.from("profiles").upsert({id:r.data.user.id,username:name.toLowerCase().replace(/\s/g,"_"),full_name:name});
  }
  el("m-auth").classList.remove("open");
  btn.textContent="Създай акаунт →";btn.disabled=false;
  showToast("🎉 Провери имейла си за потвърждение!");
}

function openUpload(){
  if(!ME){el("m-auth").classList.add("open");lucide.createIcons();return;}
  resetUpload();el("m-upload").classList.add("open");lucide.createIcons();
}

function bindUpload(){
  el("upl-dz").onclick=function(){el("upl-inp").click();};
  el("upl-inp").onchange=function(){if(this.files&&this.files[0])setFile(this.files[0]);};
  el("upl-fi-rm").onclick=resetUpload;
  el("upl-go-btn").onclick=startUpload;
  el("upl-cancel-btn").onclick=function(){if(uplXhr){uplXhr.abort();uplXhr=null;}el("m-upload").classList.remove("open");resetUpload();};
  el("upl-dz").ondragover=function(e){e.preventDefault();this.classList.add("over");};
  el("upl-dz").ondragleave=function(){this.classList.remove("over");};
  el("upl-dz").ondrop=function(e){e.preventDefault();this.classList.remove("over");if(e.dataTransfer&&e.dataTransfer.files[0])setFile(e.dataTransfer.files[0]);};
}

function setFile(f){uplFile=f;el("upl-dz").style.display="none";el("upl-fi").style.display="flex";el("upl-fi-name").textContent=f.name;el("upl-fi-size").textContent=fmtBytes(f.size);}
function resetUpload(){uplFile=null;el("upl-inp").value="";el("upl-dz").style.display="block";el("upl-fi").style.display="none";el("upl-prog").style.display="none";el("upl-suc").style.display="none";el("upl-act").style.display="block";el("upl-bar").style.width="0";el("upl-title").value="";el("upl-desc").value="";}

async function startUpload(){
  if(!uplFile){showToast("Избери видео!");return;}
  var tit=el("upl-title");if(!tit.value.trim()){showToast("Въведи заглавие!");return;}
  var token="";
  if(sb){try{var s=await sb.auth.getSession();if(s.data&&s.data.session)token=s.data.session.access_token;}catch(e){}}
  if(!token){showToast("Влез в акаунта!");return;}
  el("upl-act").style.display="none";el("upl-prog").style.display="block";
  try{
    var pr=await fetch(BACKEND+"/presign",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({fileName:uplFile.name,mimeType:uplFile.type,title:tit.value.trim(),description:el("upl-desc").value,access:el("upl-access").value})});
    var pd=await pr.json();
    if(!pr.ok){el("upl-act").style.display="block";showToast("❌ "+(pd.error||"Грешка"));return;}
    var t0=Date.now();
    uplXhr=new XMLHttpRequest();
    uplXhr.open("PUT",pd.uploadUrl,true);
    uplXhr.setRequestHeader("Content-Type",uplFile.type);
    uplXhr.upload.onprogress=function(e){
      if(!e.lengthComputable)return;
      var p=Math.round(e.loaded/e.total*100);
      el("upl-bar").style.width=p+"%";el("upl-pct").textContent=p+"%";
      var s=Math.max(0.1,(Date.now()-t0)/1000);
      el("upl-spd").textContent=fmtBytes(e.loaded)+" / "+fmtBytes(e.total)+" — "+((e.loaded/1048576)/s).toFixed(1)+" MB/s";
    };
    uplXhr.onload=function(){
      uplXhr=null;
      if(this.status===200){el("upl-prog").style.display="none";el("upl-suc").style.display="block";showToast("✅ Качено успешно!");setTimeout(function(){renderFeed();},2000);}
      else{el("upl-act").style.display="block";showToast("❌ Грешка: "+this.status);}
    };
    uplXhr.onerror=function(){uplXhr=null;el("upl-act").style.display="block";showToast("❌ Мрежова грешка.");};
    uplXhr.send(uplFile);
  }catch(err){el("upl-act").style.display="block";showToast("❌ "+err.message);}
}

function bindMenu(){
  el("menu-open-btn").onclick=function(){el("m-menu").classList.add("open");lucide.createIcons();};
  el("m-theme").onclick=function(){toggleTheme();el("m-menu").classList.remove("open");};
  el("m-terms").onclick=function(){window.location.href="terms.html";};
  el("m-privacy").onclick=function(){window.location.href="privacy.html";};
  el("m-contact").onclick=function(){window.location.href="contact.html";};
  el("m-about").onclick=function(){window.location.href="about.html";};
  el("m-logout").onclick=async function(){if(sb)await sb.auth.signOut();ME=null;el("m-menu").classList.remove("open");showToast("👋 Излязохте.");renderProfile();};
}
